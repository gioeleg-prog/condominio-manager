// SPESE
// ===========================
function renderSpese() {
  const canEdit = canUserEdit(state.user);
  const myEdId = getUserEdificio(state.user);
  let items = isSuperAdmin(state.user) ? state.spese : state.spese.filter(s=>s.edificioId===state.edificioAttivo);
  if (state.filterAnno) items = items.filter(s=>new Date(s.data).getFullYear()===state.filterAnno);
  if (state.filterCat !== 'all') items = items.filter(s=>s.categoria===state.filterCat);
  if (state.filterTipo !== 'all') items = items.filter(s=>s.tipoSpesa===state.filterTipo);
  if (state.searchQ) items = items.filter(s=>s.titolo.toLowerCase().includes(state.searchQ.toLowerCase())||s.descrizione?.toLowerCase().includes(state.searchQ.toLowerCase()));
  if (state.filterStato === 'definitiva')   items = items.filter(s=>parseFloat(s.consuntivo||0)>0);
  if (state.filterStato === 'previsionale') items = items.filter(s=>parseFloat(s.consuntivo||0)===0 && parseFloat(s.preventivo||0)>0);
  if (state.filterFornitore !== 'all')      items = items.filter(s=>String(s.fornitoreId)===state.filterFornitore);

  // ── Ordinamento ──────────────────────────────────────────────────────────
  const col = state.sortCol || 'data';
  const dir = state.sortDir || 'desc';
  items = [...items].sort((a, b) => {
    let va, vb;
    switch(col) {
      case 'data':       va = a.data||''; vb = b.data||''; break;
      case 'titolo':     va = (a.titolo||'').toLowerCase(); vb = (b.titolo||'').toLowerCase(); break;
      case 'categoria':  { const ca=getCategorie().find(c=>c.id===a.categoria); const cb=getCategorie().find(c=>c.id===b.categoria); va=(ca?.label||'').toLowerCase(); vb=(cb?.label||'').toLowerCase(); break; }
      case 'tipo':       va = (a.tipoSpesa||'').toLowerCase(); vb = (b.tipoSpesa||'').toLowerCase(); break;
      case 'fornitore':  { const fa=state.fornitori.find(f=>f.id===a.fornitoreId); const fb=state.fornitori.find(f=>f.id===b.fornitoreId); va=(fa?.nome||'zzz').toLowerCase(); vb=(fb?.nome||'zzz').toLowerCase(); break; }
      case 'preventivo': va = parseFloat(a.preventivo||0); vb = parseFloat(b.preventivo||0); break;
      case 'consuntivo': va = parseFloat(a.consuntivo||0); vb = parseFloat(b.consuntivo||0); break;
      case 'stato':      va = parseFloat(a.consuntivo||0)>0?'1':'0'; vb = parseFloat(b.consuntivo||0)>0?'1':'0'; break;
      default:           va = a.data||''; vb = b.data||'';
    }
    if (va < vb) return dir==='asc' ? -1 : 1;
    if (va > vb) return dir==='asc' ?  1 : -1;
    return 0;
  });

  // Helper: intestazione cliccabile
  const thSort = (label, colId) => {
    const isActive = col === colId;
    const icon = isActive ? (dir==='asc' ? '▲' : '▼') : '⇅';
    return `<th class="th-sort ${isActive?'active':''}" data-sort-col="${colId}">${label}<span class="sort-icon">${icon}</span></th>`;
  };

  const anni = getAnni();
  const totCons = items.reduce((a,s)=>a+(parseFloat(s.consuntivo||0)),0);
  const totPrev = items.reduce((a,s)=>a+(parseFloat(s.preventivo||0)),0);
  // Scarto: solo su spese già consuntivate (ha senso solo quando entrambi i valori esistono)
  const speseChiuse     = items.filter(s=>parseFloat(s.consuntivo||0)>0 && parseFloat(s.preventivo||0)>0);
  const totPrevChiuse   = speseChiuse.reduce((a,s)=>a+parseFloat(s.preventivo||0),0);
  const totConsChiuse   = speseChiuse.reduce((a,s)=>a+parseFloat(s.consuntivo||0),0);
  const scarto          = totConsChiuse - totPrevChiuse;
  const nSpeseAperte    = items.filter(s=>parseFloat(s.consuntivo||0)===0 && parseFloat(s.preventivo||0)>0).length;
  // nAttivi per calcolo quote (esclude superAdmin)
  const nAttiviSpese = state.condomini.filter(c=>c.edificioId===state.edificioAttivo&&!c.disabled&&!c.superAdmin).length || 1;

  return `
  <div>
    <div class="page-header spese-page-header">
      <div><div class="page-title">Spese</div><div class="page-sub">${items.length} voci</div></div>
      <div style="display:flex;gap:.5rem">
        ${canEdit?`<button class="btn btn-primary btn-add-spesa" id="btn-add-spesa">+ Aggiungi spesa</button>`:''}
        ${canEdit?`<button class="btn btn-secondary" id="btn-toggle-multisel" title="Seleziona più spese">☑ Seleziona</button>`:''}
      </div>
    </div>

    <!-- Barra selezione multipla -->
    ${state.speseSelezionate && state.speseSelezionate.size > 0 ? `
    <div class="sel-count-bar">
      <span>${state.speseSelezionate.size} spese selezionate</span>
      <button id="btn-sel-all">Seleziona tutte (${items.length})</button>
      <button id="btn-sel-none">Deseleziona</button>
      <button class="danger" id="btn-del-sel">🗑 Elimina selezionate</button>
    </div>` : ''}

    <div class="stats-grid spese-stats" style="margin-bottom:1rem;grid-template-columns:repeat(auto-fill,minmax(200px,1fr))">

      <!-- 1. ACTUAL -->
      <div class="stat-card stat-red">
        <div class="stat-label" style="display:flex;align-items:center;gap:5px">
          <span style="font-size:9px;background:#fee2e2;color:var(--red);border-radius:3px;padding:1px 5px;font-weight:700">ACTUAL</span>
          Uscite consuntivate
        </div>
        <div class="stat-value">${fmt(totCons)}</div>
        <div class="stat-sub">${speseChiuse.length} spese chiuse</div>
      </div>

      <!-- 2. FORECAST -->
      <div class="stat-card" style="border-top:3px solid #7c3aed">
        <div class="stat-label" style="display:flex;align-items:center;gap:5px">
          <span style="font-size:9px;background:#ede9fe;color:#7c3aed;border-radius:3px;padding:1px 5px;font-weight:700">FORECAST</span>
          Spese da consuntivare
        </div>
        <div class="stat-value" style="color:#7c3aed">${nSpeseAperte>0?fmt(totPrev-totPrevChiuse):'—'}</div>
        <div class="stat-sub">${nSpeseAperte>0?nSpeseAperte+' spese aperte':'Nessuna spesa aperta'}</div>
      </div>

      <!-- 3. QUOTA ACTUAL -->
      <div class="stat-card stat-blue">
        <div class="stat-label" style="display:flex;align-items:center;gap:5px">
          <span style="font-size:9px;background:#dbeafe;color:var(--accent);border-radius:3px;padding:1px 5px;font-weight:700">ACTUAL</span>
          Quota / cond.
        </div>
        <div class="stat-value">${fmt(totCons/nAttiviSpese)}</div>
        <div class="stat-sub">Solo spese chiuse</div>
      </div>

      <!-- 4. QUOTA PROIETTATA -->
      <div class="stat-card" style="border-top:3px solid #0891b2">
        <div class="stat-label" style="display:flex;align-items:center;gap:5px">
          <span style="font-size:9px;background:#cffafe;color:#0891b2;border-radius:3px;padding:1px 5px;font-weight:700">PROIEZIONE</span>
          Quota / cond. full
        </div>
        <div class="stat-value" style="color:#0891b2">${fmt((totCons + (totPrev - totPrevChiuse)) / nAttiviSpese)}</div>
        <div class="stat-sub">Actual + ${nSpeseAperte} spese aperte</div>
      </div>

    </div>

    <!-- Scarto: visibile solo se ci sono spese chiuse con entrambi i valori -->
    ${speseChiuse.length>0?`
    <div style="display:flex;align-items:center;gap:.75rem;padding:.5rem .875rem;background:${scarto<=0?'#f0fdf4':'#fef2f2'};border-radius:var(--radius-sm);margin-bottom:1rem;font-size:13px">
      <span style="font-weight:600;color:${scarto<=0?'var(--green)':'var(--red)'}">
        ${scarto<=0?'✅':'⚠️'} Scarto prev/cons (spese chiuse): ${scarto>0?'+':''}${fmt(scarto)}
      </span>
      <span style="color:var(--text2)">${speseChiuse.length} spese · prev. ${fmt(totPrevChiuse)} → cons. ${fmt(totConsChiuse)}</span>
    </div>`:''}

    <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center">
      <!-- Ricerca: max metà schermo -->
      <input type="text" class="spese-filter-search" placeholder="🔍 Cerca…" id="search-spese"
        value="${esc(state.searchQ)}" style="flex:0 1 220px;min-width:120px;max-width:280px">

      <!-- Anno -->
      <select class="spese-filter-sel" id="filter-anno-spese" style="flex:0 1 90px;min-width:70px">
        <option value="0">Tutti</option>
        ${anni.map(a=>`<option value="${a}" ${a===state.filterAnno?'selected':''}>${a}</option>`).join('')}
      </select>

      <!-- Tipo -->
      <select class="spese-filter-sel" id="filter-tipo-spese" style="flex:0 1 110px;min-width:90px">
        <option value="all">Tutti tipi</option>
        <option value="ordinaria"     ${state.filterTipo==='ordinaria'?'selected':''}>Ordinaria</option>
        <option value="straordinaria" ${state.filterTipo==='straordinaria'?'selected':''}>Straord.</option>
      </select>

      <!-- Stato (nuovo) -->
      <select class="spese-filter-sel" id="filter-stato-spese" style="flex:0 1 120px;min-width:100px">
        <option value="all">Tutti stati</option>
        <option value="definitiva"   ${state.filterStato==='definitiva'?'selected':''}>✅ Definitiva</option>
        <option value="previsionale" ${state.filterStato==='previsionale'?'selected':''}>🔮 Previsionale</option>
      </select>

      <!-- Categoria -->
      <select class="spese-filter-sel" id="filter-cat-spese" style="flex:0 1 140px;min-width:110px">
        <option value="all">Tutte cat.</option>
        ${getCategorie().filter(c=>c.tipo!=='entrata').map(c=>`<option value="${c.id}" ${c.id===state.filterCat?'selected':''}>${c.icon||''} ${c.label}</option>`).join('')}
      </select>

      <!-- Fornitore (nuovo) -->
      <select class="spese-filter-sel" id="filter-fornitore-spese" style="flex:0 1 130px;min-width:100px">
        <option value="all">Tutti forn.</option>
        ${(state.fornitori||[]).filter(f=>!f.disabled&&(!f.edificioId||f.edificioId===state.edificioAttivo)).map(f=>`<option value="${f.id}" ${String(f.id)===state.filterFornitore?'selected':''}>${esc(f.nome)}</option>`).join('')}
      </select>

      <!-- Reset filtri (appare se c'è qualche filtro attivo) -->
      ${state.filterTipo!=='all'||state.filterCat!=='all'||state.filterStato!=='all'||state.filterFornitore!=='all'||state.searchQ?
        `<button class="btn btn-secondary btn-sm" id="btn-reset-filtri" title="Azzera filtri" style="white-space:nowrap;padding:7px 10px">✕ Reset</button>`:''
      }
    </div>

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:.5rem">
      ${renderSpeseMobileCards(items, canEdit)}
      <div class="table-wrap">
        ${items.length===0?`<div class="empty">${svgEmpty()}<p>Nessuna spesa trovata</p></div>`:
        `<table>
          <thead><tr>
            ${state.speseSelezionate !== undefined ? `<th style="width:28px;padding:0 4px"><input type="checkbox" id="chk-all-spese" title="Seleziona/deseleziona tutte"></th>` : ''}
            ${canEdit?'<th class="col-azioni">Azioni</th>':''}
            ${thSort('Data','data')}
            ${thSort('Titolo / Descrizione','titolo')}
            ${thSort('Categoria','categoria')}
            ${thSort('Tipo','tipo')}
            ${thSort('Fornitore','fornitore')}
            ${thSort('Preventivo','preventivo')}
            ${thSort('Consuntivo','consuntivo')}
            ${thSort('Stato','stato')}
            <th class="col-quota">Quota</th>
            <th class="col-allegati">Allegati</th>
          </tr></thead>
          <tbody>
          ${items.map(s=>{
            const cat = getCategorie().find(c=>c.id===s.categoria)||{label:s.categoria};
            const hasPrev = s.preventivo && parseFloat(s.preventivo)>0;
            const hasCons = s.consuntivo && parseFloat(s.consuntivo)>0;
            const isSel = state.speseSelezionate?.has(s.id);
            return `<tr class="${isSel?'spesa-row-sel':''}">
              <td style="width:28px;padding:0 4px;text-align:center"><input type="checkbox" class="chk-spesa" data-spesa-id="${s.id}" ${isSel?'checked':''}></td>
              ${canEdit?`<td class="col-azioni"><div class="inline-actions">
                <button class="btn btn-secondary btn-sm" data-edit-spesa="${s.id}" title="Modifica spesa">✏️</button>
                <button class="btn btn-danger btn-sm" data-del-spesa="${s.id}" title="Elimina spesa">🗑</button>
              </div></td>`:''}
              <td class="col-data" style="font-size:13px">${s.data}</td>
              <td class="col-title">
                <div style="font-weight:500">${esc(s.titolo)}</div>
                ${s.descrizione?`<div style="font-size:12px;color:var(--text2)">${esc(s.descrizione)}</div>`:''}
                ${s.ricorrente?`<span class="ricorrente-badge">🔁 ${s.frequenza||'mensile'}</span>`:''}
              </td>
              <td><span class="badge badge-gray">${cat.label}</span></td>
              <td><span class="badge ${s.tipoSpesa==='straordinaria'?'badge-purple':'badge-blue'}">${s.tipoSpesa==='straordinaria'?'Str.':'Ord.'}</span></td>
              <td style="white-space:nowrap">${(()=>{
                if (!s.fornitoreId) return '<span style="color:var(--text2);font-size:12px">—</span>';
                const forn = state.fornitori.find(f=>f.id===s.fornitoreId);
                if (!forn) return '<span style="color:var(--text2);font-size:12px">—</span>';
                const catF = CATEGORIE_FORNITORE.find(c=>c.id===forn.categoria)||{icon:'📦'};
                return '<span style="font-size:12px;font-weight:500">'+catF.icon+' '+esc(forn.nome)+'</span>';
              })()}</td>
              <td style="text-align:right;white-space:nowrap">${hasPrev?`<span style="color:var(--amber);font-weight:500">${fmt(s.preventivo)}</span>`:'<span style="color:var(--text2)">—</span>'}</td>
              <td style="text-align:right;white-space:nowrap">${hasCons?`<span class="amount-neg">${fmt(s.consuntivo)}</span>`:'<span style="color:var(--text2)">—</span>'}</td>
              <td class="col-stato">
                ${hasCons?'<span class="badge badge-green">Definitiva</span>':'<span class="badge badge-amber">Previsionale</span>'}
              </td>
              <td class="col-quota">${renderQuotaCell(s)}</td>
              <td class="col-allegati">${renderAllegatiChip(s)}</td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>`}
      </div>
    </div>
  </div>`;
}

// ===========================
// ENTRATE
// ===========================
function renderEntrate() {
  const canEdit = canUserEdit(state.user);
  const myEdId2 = getUserEdificio(state.user);
  let items = isSuperAdmin(state.user) ? state.entrate : state.entrate.filter(e=>e.edificioId===state.edificioAttivo);
  if (state.filterAnno) items = items.filter(e=>new Date(e.data).getFullYear()===state.filterAnno);
  if (state.searchQ) items = items.filter(e=>{
    const cond = state.condomini.find(c=>c.id===e.condominoId)||{nome:''};
    return cond.nome.toLowerCase().includes(state.searchQ.toLowerCase())||e.descrizione?.toLowerCase().includes(state.searchQ.toLowerCase());
  });
  items = [...items].sort((a,b)=>new Date(b.data)-new Date(a.data));
  const totale = items.reduce((a,e)=>a+parseFloat(e.importo||0),0);

  const anni = getAnni();
  const perCondomino = state.condomini.filter(c=>c.edificioId===state.edificioAttivo&&!c.disabled&&!c.superAdmin).map(c=>{
    const tot = items.filter(e=>e.condominoId===c.id).reduce((a,e)=>a+parseFloat(e.importo||0),0);
    return {...c, totale:tot};
  });
  // ── Calcoli quota per condomino con split reali ──────────────────────────
  const _allSpeseEnt = isSuperAdmin(state.user) ? state.spese : state.spese.filter(s=>!s.edificioId||s.edificioId===myEdId2);
  const speseAnno = _allSpeseEnt.filter(s=>!state.filterAnno||new Date(s.data).getFullYear()===state.filterAnno);
  const nAttiviEnt = state.condomini.filter(c=>c.edificioId===state.edificioAttivo&&!c.disabled&&!c.superAdmin).length || 1;

  // Quota per ogni condomino usando split reali — divisa tra ord/straord
  function getQuotaCondomino(condId) {
    let ord = 0, straord = 0, ordPrev = 0, straordPrev = 0;
    speseAnno.forEach(s => {
      const hasCons = parseFloat(s.consuntivo||0) > 0;
      const hasPrev = parseFloat(s.preventivo||0) > 0;
      const refActual = parseFloat(s.consuntivo||0);
      const refFull   = parseFloat(s.consuntivo||s.preventivo||0);
      const getPerc = (ref) => {
        if (!ref) return 0;
        if (s.split?.length) {
          const e = s.split.find(x=>x.id===condId);
          return e ? (e.perc||0)/100*ref : ref/nAttiviEnt;
        }
        return ref/nAttiviEnt;
      };
      if (hasCons) {
        if (s.tipoSpesa==='straordinaria') straord += getPerc(refActual);
        else ord += getPerc(refActual);
      }
      if (hasPrev && !hasCons) {
        if (s.tipoSpesa==='straordinaria') straordPrev += getPerc(refFull);
        else ordPrev += getPerc(refFull);
      }
    });
    return { ord, straord, ordPrev, straordPrev,
      totActual: ord + straord,
      totFull:   ord + straord + ordPrev + straordPrev };
  }

  return `
  <div>
    <div class="page-header">
      <div><div class="page-title">Entrate / Quote</div><div class="page-sub">${items.length} versamenti</div></div>
      ${canEdit?`<button class="btn btn-primary" id="btn-add-entrata">+ Registra versamento</button>`:''}
    </div>

    <div class="spese-filters">
      <input type="text" class="spese-filter-search" placeholder="🔍 Cerca condomino…" id="search-entrate" value="${esc(state.searchQ)}">
      <div class="spese-filter-row">
        <select class="spese-filter-sel" id="filter-anno-entrate">
          <option value="0">Tutti gli anni</option>
          ${anni.map(a=>`<option value="${a}" ${a===state.filterAnno?'selected':''}>${a}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="card" style="margin-bottom:1.5rem">
      <div class="card-header">
        <h3>Stato versamenti per condomino (${state.filterAnno||'tutti gli anni'})</h3>
      </div>
      <div style="padding:.75rem 1.25rem 1rem">
        <!-- Legenda -->
        <div style="display:flex;gap:1.25rem;flex-wrap:wrap;margin-bottom:1rem;font-size:12px">
          <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:var(--green)"></div><span style="color:var(--text2)">Versato (reale)</span></div>
          <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:var(--accent)"></div><span style="color:var(--text2)">Quota ord. (actual)</span></div>
          <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:var(--purple)"></div><span style="color:var(--text2)">Quota straord. (actual)</span></div>
          <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:#a78bfa;opacity:.6"></div><span style="color:var(--text2)">Da consuntivare (prev.)</span></div>
        </div>

        <div class="condomini-grid" style="grid-template-columns:repeat(auto-fill,minmax(240px,1fr))">
          ${perCondomino.map(c=>{
            const versato       = items.filter(e=>e.condominoId===c.id && !e.previsionale).reduce((a,e)=>a+parseFloat(e.importo||0),0);
            const versatoPrev   = items.filter(e=>e.condominoId===c.id &&  e.previsionale).reduce((a,e)=>a+parseFloat(e.importo||0),0);
            const q             = getQuotaCondomino(c.id);
            // Riporto anni precedenti per questo condomino
            const annoSel       = state.filterAnno || new Date().getFullYear();
            const myEdId2l      = getUserEdificio(state.user);
            const versatiPrec   = (isSuperAdmin(state.user)?state.entrate:state.entrate.filter(e=>!e.edificioId||e.edificioId===myEdId2l))
              .filter(e=>e.condominoId===c.id && !e.previsionale && new Date(e.data).getFullYear()<annoSel)
              .reduce((a,e)=>a+parseFloat(e.importo||0),0);
            const spesePrecQuota= (isSuperAdmin(state.user)?state.spese:state.spese.filter(s=>!s.edificioId||s.edificioId===myEdId2l))
              .filter(s=>new Date(s.data).getFullYear()<annoSel && parseFloat(s.consuntivo||0)>0)
              .reduce((acc,s)=>{
                const ref=parseFloat(s.consuntivo||0);
                if(s.split?.length){const e=s.split.find(x=>x.id===c.id);return acc+(e?(e.perc||0)/100*ref:ref/nAttiviEnt);}
                return acc+ref/nAttiviEnt;
              },0);
            const riporto       = versatiPrec - spesePrecQuota;
            const diffActual    = versato - q.totActual;
            const saldoCassa    = riporto + diffActual;  // saldo reale con riporto
            const diffFull      = versato + versatoPrev - q.totFull;
            const percActual    = q.totActual>0 ? Math.min(100,Math.round(versato/q.totActual*100)) : 0;
            const percFull      = q.totFull>0   ? Math.min(100,Math.round((versato+versatoPrev)/q.totFull*100)) : 0;
            const coloreBar     = percActual>=100?'var(--green)':percActual>=60?'var(--amber)':'var(--red)';
            const statoOK       = saldoCassa >= 0;

            return `<div class="condomino-card">
              <!-- HEADER -->
              <div class="head">
                <div class="avatar" style="${avatarStyle(c.color)}">${initials(c.nome)}</div>
                <div style="flex:1;min-width:0">
                  <div class="name">${esc(c.nome)}</div>
                  <div class="apt">${c.appartamento}</div>
                </div>
                <span class="badge ${statoOK?'badge-green':'badge-red'}" style="font-size:10px">${statoOK?'✓ OK':'⚠ Scoperto'}</span>
              </div>

              <!-- SEZIONE 1: CASSA REALE -->
              <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:.625rem .75rem;margin-bottom:.5rem">
                <div style="font-size:10px;font-weight:700;color:var(--green);letter-spacing:.06em;margin-bottom:5px">💰 INCASSI (ACTUAL)</div>
                <div class="row"><span>Versato ${annoSel}</span><span style="font-weight:600;color:var(--green)">${fmt(versato)}</span></div>
                ${riporto!==0?`<div class="row"><span style="color:var(--text2);font-size:12px">Riporto anni prec.</span><span style="font-size:12px;color:${riporto>=0?'var(--green)':'var(--red)'}">${riporto>=0?'+':''}${fmt(riporto)}</span></div>`:''}
                ${versatoPrev>0?`<div class="row"><span style="color:#7c3aed;font-size:12px">🔮 Previsionali attesi</span><span style="font-size:12px;color:#7c3aed">${fmt(versatoPrev)}</span></div>`:''}
              </div>

              <!-- SEZIONE 2: SPESE ACTUAL -->
              <div style="padding:.5rem 0;border-top:1px solid var(--border)">
                <div style="font-size:10px;font-weight:700;color:var(--red);letter-spacing:.06em;margin-bottom:5px">📋 QUOTA SPESE (ACTUAL)</div>
                ${q.ord>0?`<div class="row" style="font-size:12px"><span style="color:var(--accent)">Ordinarie</span><span style="color:var(--accent)">${fmt(q.ord)}</span></div>`:''}
                ${q.straord>0?`<div class="row" style="font-size:12px"><span style="color:var(--purple)">Straordinarie</span><span style="color:var(--purple)">${fmt(q.straord)}</span></div>`:''}
                <div class="row" style="font-weight:700;border-top:1px dashed var(--border);margin-top:3px;padding-top:3px">
                  <span>Totale dovuto</span><span>${fmt(q.totActual)}</span>
                </div>
              </div>

              <!-- SEZIONE 3: SALDO REALE -->
              <div style="padding:.5rem 0;border-top:2px solid var(--border)">
                <div class="row" style="font-weight:700;font-size:14px">
                  <span>Saldo reale${riporto!==0?' (con riporto)':''}</span>
                  <span style="color:${saldoCassa>=0?'var(--green)':'var(--red)'}">${saldoCassa>=0?'+':''}${fmt(saldoCassa)}</span>
                </div>
                <div style="margin-top:5px">
                  <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:3px">
                    <span>Copertura actual</span><span style="font-weight:600;color:${coloreBar}">${percActual}%</span>
                  </div>
                  <div class="progress-wrap">
                    <div class="progress-fill" style="width:${percActual}%;background:${coloreBar}"></div>
                  </div>
                </div>
              </div>

              <!-- SEZIONE 4: FORECAST aggregato (solo totali, dettaglio in fondo pagina) -->
              ${q.ordPrev>0||q.straordPrev>0?`
              <div style="padding:.5rem 0;border-top:1px solid #e9d5ff;margin-top:.25rem">
                <div style="font-size:10px;font-weight:700;color:#7c3aed;letter-spacing:.06em;margin-bottom:5px">🔮 FORECAST</div>
                ${q.ordPrev>0?`<div class="row" style="font-size:12px;color:#7c3aed"><span>Ordinarie</span><span>${fmt(q.ordPrev)}</span></div>`:''}
                ${q.straordPrev>0?`<div class="row" style="font-size:12px;color:#7c3aed"><span>Straordinarie</span><span>${fmt(q.straordPrev)}</span></div>`:''}
                <div class="row" style="font-weight:700;color:#0891b2;border-top:1px dashed #e9d5ff;margin-top:3px;padding-top:3px">
                  <span>Quota proiettata</span><span>${fmt(q.totFull)}</span>
                </div>
                <div class="row" style="font-size:12px">
                  <span style="color:var(--text2)">Saldo proiettato</span>
                  <span style="font-weight:600;color:${diffFull>=0?'var(--green)':'var(--red)'}">${diffFull>=0?'+':''}${fmt(diffFull)}</span>
                </div>
                <div style="margin-top:5px">
                  <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:3px">
                    <span>Copertura proiettata</span><span style="font-weight:600;color:#7c3aed">${percFull}%</span>
                  </div>
                  <div class="progress-wrap">
                    <div class="progress-fill" style="width:${percActual}%;background:${coloreBar}"></div>
                    <div style="width:${Math.max(0,percFull-percActual)}%;background:#7c3aed;opacity:.35;height:100%"></div>
                  </div>
                </div>
              </div>`:''}
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    ${renderPianoRateBox(state.filterAnno || new Date().getFullYear(), canEdit)}

    <!-- DETTAGLIO SPESE FORECAST PRO-CAPITE -->
    ${(()=>{
      const speseAperte = speseAnno.filter(s=>parseFloat(s.consuntivo||0)===0 && parseFloat(s.preventivo||0)>0);
      if (speseAperte.length === 0) return '';
      return '<div class="card" style="margin-bottom:1rem">' +
        '<div class="card-header"><h3>🔮 Dettaglio spese forecast — quota per condomino</h3>' +
        '<span style="font-size:12px;color:var(--text2)">' + speseAperte.length + ' spese da consuntivare</span></div>' +
        '<div class="table-wrap"><table>' +
        '<thead><tr>' +
        '<th>Spesa</th><th>Tipo</th><th>Preventivo</th>' +
        perCondomino.map(c=>'<th style="text-align:right;font-size:11px">' + initials(c.nome) + '<br><span style="font-weight:400;color:var(--text2)">' + c.appartamento + '</span></th>').join('') +
        '</tr></thead><tbody>' +
        speseAperte.map(s=>{
          const ref = parseFloat(s.preventivo||0);
          const quoteCond = perCondomino.map(c=>{
            let q = 0;
            if (s.split?.length) { const e=s.split.find(x=>x.id===c.id); q=e?(e.perc||0)/100*ref:ref/nAttiviEnt; }
            else q = ref/nAttiviEnt;
            return '<td style="text-align:right;font-size:12px;color:#7c3aed">' + fmt(q) + '</td>';
          }).join('');
          return '<tr>' +
            '<td style="font-weight:500;font-size:13px">' + esc(s.titolo) + '</td>' +
            '<td><span class="badge ' + (s.tipoSpesa==='straordinaria'?'badge-purple':'badge-blue') + '" style="font-size:10px">' + (s.tipoSpesa==='straordinaria'?'Straord.':'Ord.') + '</span></td>' +
            '<td style="text-align:right;color:var(--amber);font-weight:500">' + fmt(ref) + '</td>' +
            quoteCond +
          '</tr>';
        }).join('') +
        '<tr style="border-top:2px solid var(--border);font-weight:700">' +
        '<td>Totale forecast</td><td></td>' +
        '<td style="text-align:right;color:var(--amber)">' + fmt(speseAperte.reduce((a,s)=>a+parseFloat(s.preventivo||0),0)) + '</td>' +
        perCondomino.map(c=>{
          const tot = speseAperte.reduce((a,s)=>{
            const ref=parseFloat(s.preventivo||0);
            let q=0;
            if(s.split?.length){const e=s.split.find(x=>x.id===c.id);q=e?(e.perc||0)/100*ref:ref/nAttiviEnt;}
            else q=ref/nAttiviEnt;
            return a+q;
          },0);
          return '<td style="text-align:right;color:#7c3aed">' + fmt(tot) + '</td>';
        }).join('') +
        '</tr></tbody></table></div></div>';
    })()}

    <div class="card">
      <div class="card-header"><h3>Tutti i versamenti</h3><strong style="color:var(--green)">${fmt(totale)}</strong></div>
      ${renderEntrateMobileCards(items, canEdit)}
      <div class="table-wrap">
        ${items.length===0?`<div class="empty">${svgEmpty()}<p>Nessun versamento registrato</p></div>`:
        `<table>
          <thead><tr>
            ${canEdit?'<th style="width:90px">Azioni</th>':''}
            <th>Data</th><th>Condomino</th><th>Descrizione</th><th>Categoria</th><th>Importo</th><th>Stato</th>
          </tr></thead>
          <tbody>
          ${items.map(e=>{
            const cond = state.condomini.find(c=>c.id===e.condominoId)||{nome:'Sconosciuto',color:'#888'};
            const cat  = getCategorie().find(c=>c.id===e.categoria)||{label:e.categoria||'—'};
            return `<tr style="${e.previsionale?'background:#fffbeb;':''}">
              ${canEdit?`<td><div class="inline-actions">
                <button class="btn btn-secondary btn-sm" data-edit-entrata="${e.id}" title="Modifica versamento">✏️</button>
                <button class="btn btn-danger btn-sm" data-del-entrata="${e.id}" title="Elimina versamento">🗑</button>
              </div></td>`:''}
              <td style="white-space:nowrap;font-size:13px">${e.data}</td>
              <td><div style="display:flex;align-items:center;gap:8px">
                <div class="avatar" style="${avatarStyle(cond.color)};width:28px;height:28px;font-size:11px">${initials(cond.nome)}</div>
                <div>
                  <div style="font-size:13px;font-weight:500">${esc(cond.nome)}</div>
                  <div style="font-size:11px;color:var(--text2)">${cond.appartamento}</div>
                </div>
              </div></td>
              <td style="font-size:13px">${esc(e.descrizione||'—')}</td>
              <td><span class="badge badge-green" style="font-size:10px">${cat.label}</span></td>
              <td class="${e.previsionale?'':'amount-pos'}" style="font-weight:700;color:${e.previsionale?'#92400e':'var(--green)'}">${fmt(e.importo)}</td>
              <td>${e.previsionale
                ? `<span class="prev-badge">🔮 Prev.</span>`
                : `<span class="badge badge-green" style="font-size:10px">✓ Effettivo</span>`}
                ${e.previsionale && canEdit ? `<button class="btn-valida" data-valida-entrata="${e.id}" style="margin-top:3px;font-size:11px">✅</button>` : ''}
              </td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>`}
      </div>
    </div>
  </div>`;
}

// ===========================
// BILANCIO
// ===========================
function renderBilancio() {
  const anno    = state.filterAnno;
  const oggi    = new Date();
  const meseCurr = oggi.getMonth();
  const anni    = getAnni();
  const tab     = state.bilancioTab || 'overview';
  // STRICT: solo condomini dell'edificio attivo
  const nAttivi = state.condomini
    .filter(c => c.edificioId === state.edificioAttivo && !c.disabled && !c.superAdmin).length || 1;


  const _bilSpese   = state.spese.filter(s=>s.edificioId===state.edificioAttivo);
  const _bilEntrate = state.entrate.filter(e=>e.edificioId===state.edificioAttivo);
  const spese   = _bilSpese.filter(s=>new Date(s.data).getFullYear()===anno);
  const entrate = _bilEntrate.filter(e=>new Date(e.data).getFullYear()===anno);
  const nomiMesi = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];

  // ── Separazione ACTUALS vs FORECAST ──────────────────────────────────────
  const speseActual   = spese.filter(s=>parseFloat(s.consuntivo||0)>0);
  const speseOnlyPrev = spese.filter(s=>parseFloat(s.consuntivo||0)===0 && parseFloat(s.preventivo||0)>0);
  const entrateActual   = entrate.filter(e=>!e.previsionale);
  const entratePrevis   = entrate.filter(e=>e.previsionale);

  // Totali ACTUAL (solo dati reali anno selezionato)
  const totCons         = speseActual.reduce((a,s)=>a+parseFloat(s.consuntivo||0),0);
  const totEntrateActual= entrateActual.reduce((a,e)=>a+parseFloat(e.importo||0),0);
  const saldoRiporto    = getSaldoRiporto(anno);   // riporto anni precedenti
  const saldoAnno       = totEntrateActual - totCons; // solo anno selezionato
  const saldo           = saldoRiporto + saldoAnno;  // cassa totale reale

  // Totali FORECAST aggiuntivi
  const totPrevForecast = speseOnlyPrev.reduce((a,s)=>a+parseFloat(s.preventivo||0),0);
  const totPrev         = spese.reduce((a,s)=>a+parseFloat(s.preventivo||0),0);
  const totEntratePrevis= entratePrevis.reduce((a,e)=>a+parseFloat(e.importo||0),0);
  const totEntrate      = totEntrateActual; // per compatibilità
  const scartoPrevCons  = totCons - totPrev;

  // Totali "full" = actual + forecast
  const totUsciteFull   = totCons + totPrevForecast;
  const totEntrateFull  = totEntrateActual + totEntratePrevis;
  const saldoFull       = totEntrateFull - totUsciteFull;

  // Cashflow mensile: reale mese per mese, forecast per mesi futuri O spese solo-preventivo
  const isCurrYear = anno === oggi.getFullYear();
  const mesiPassati = isCurrYear ? meseCurr + 1 : 12;
  const mediaUsciteActual = mesiPassati > 0 ? totCons / mesiPassati : 0;

  const isAnnoPassatoBil = anno < oggi.getFullYear();
  const cfMensile = Array.from({length:12}, (_,m) => {
    const isPast    = isAnnoPassatoBil || m <= meseCurr;
    const isCurrent = isCurrYear && m === meseCurr;
    const speseM      = spese.filter(s=>new Date(s.data).getMonth()===m);
    const entrateM    = entrate.filter(e=>new Date(e.data).getMonth()===m);
    const consActual  = speseM.filter(s=>parseFloat(s.consuntivo||0)>0).reduce((a,s)=>a+parseFloat(s.consuntivo||0),0);
    const prevForecast= speseM.filter(s=>parseFloat(s.consuntivo||0)===0 && parseFloat(s.preventivo||0)>0).reduce((a,s)=>a+parseFloat(s.preventivo||0),0);
    const incActual   = entrateM.filter(e=>!e.previsionale).reduce((a,e)=>a+parseFloat(e.importo||0),0);
    const incPrevis   = entrateM.filter(e=>e.previsionale).reduce((a,e)=>a+parseFloat(e.importo||0),0);
    return {
      mese: nomiMesi[m], m, isPast, isCurrent,
      cons:       consActual,
      prevForecast,
      incassi:    incActual,
      incPrevis,
      totUscite:  consActual + prevForecast,
      totIncassi: incActual + incPrevis,
      isForecast: !isPast && !isAnnoPassatoBil,
    };
  });

  const mediaUscite  = mediaUsciteActual;
  const mediaIncassi = mesiPassati > 0 ? totEntrateActual / mesiPassati : 0;

  // Saldo cumulativo — parte dal riporto anni precedenti
  let cumulActual = saldoRiporto;
  let cumulFull   = saldoRiporto;
  const cfCumul = cfMensile.map(cf => {
    cumulActual += cf.incassi - cf.cons;
    cumulFull   += cf.totIncassi - cf.totUscite;
    return {...cf, cumul: cumulActual, cumulFull};
  });

  // Mese zero basato su saldo full
  let meseZero = null;
  let saldoSim = saldoFull;
  for (let m = meseCurr+1; m < 12; m++) {
    saldoSim += cfCumul[m].totIncassi - cfCumul[m].totUscite;
    if (saldoSim <= 0 && meseZero === null) meseZero = m;
  }

  const runwayMesi = mediaUscite > 0 ? Math.max(0, Math.floor(saldo / mediaUscite)) : 99;
  const maxCF = Math.max(...cfMensile.map(cf=>Math.max(cf.totUscite, cf.totIncassi, 1)), 1);

  // Categorie breakdown
  const catBreak = getCategorie().filter(c=>c.tipo!=='entrata').map(c=>{
    const spesecat  = spese.filter(s=>s.categoria===c.id);
    const totCons   = spesecat.reduce((a,s)=>a+parseFloat(s.consuntivo||0),0);
    const totFcst   = spesecat.filter(s=>!parseFloat(s.consuntivo||0)).reduce((a,s)=>a+parseFloat(s.preventivo||0),0);
    const totPrev   = spesecat.reduce((a,s)=>a+parseFloat(s.preventivo||0),0);
    const nCons     = spesecat.filter(s=>parseFloat(s.consuntivo||0)>0).length;
    const nFcst     = spesecat.filter(s=>!parseFloat(s.consuntivo||0) && parseFloat(s.preventivo||0)>0).length;
    return {...c, totCons, totFcst, totPrev, tot:totCons+totFcst, nCons, nFcst};
  }).filter(c=>c.tot>0).sort((a,b)=>b.tot-a.tot);

  // KPI per condomino — distingue actual da previsionale
  // STRICT: solo condomini con edificioId esatto dell'edificio attivo
  const condominiKPI = state.condomini
    .filter(c => c.edificioId === state.edificioAttivo && !c.disabled && !c.superAdmin)
    .map(c=>{
    const versato       = entrate.filter(e=>e.condominoId===c.id && !e.previsionale).reduce((a,e)=>a+parseFloat(e.importo||0),0);
    const versatoPrevis = entrate.filter(e=>e.condominoId===c.id &&  e.previsionale).reduce((a,e)=>a+parseFloat(e.importo||0),0);
    // Quota ACTUAL: solo consuntivo — coerente con totSpeseCons e quotaPersonale dashboard
    const quota = spese.reduce((acc,s)=>{
      const ref = parseFloat(s.consuntivo||0);
      if (!ref) return acc;
      if (s.split?.length) {
        const entry = s.split.find(x=>x.id===c.id);
        return acc + (entry?(entry.perc||0)/100*ref : ref/nAttivi);
      }
      return acc + ref/nAttivi;
    }, 0);
    // Quota FULL: consuntivo + preventivi aperti (per il forecast)
    const quotaFull = spese.reduce((acc,s)=>{
      const ref = parseFloat(s.consuntivo||s.preventivo||0);
      if (!ref) return acc;
      if (s.split?.length) {
        const entry = s.split.find(x=>x.id===c.id);
        return acc + (entry?(entry.perc||0)/100*ref : ref/nAttivi);
      }
      return acc + ref/nAttivi;
    }, 0);
    const diff = versato - quota;
    const perc = quota > 0 ? Math.min(100, Math.round(versato/quota*100)) : 0;
    const nSpese = spese.filter(s=>s.split?.some(x=>x.id===c.id)||(!s.split?.length)).length;
    const versatoFull = versato + versatoPrevis;
    const diffFull = versatoFull - quota;
    const percFull = quota > 0 ? Math.min(100, Math.round(versatoFull/quota*100)) : 0;
    const diffFull2 = versatoFull - quotaFull;
    const percFull2 = quotaFull > 0 ? Math.min(100, Math.round(versatoFull/quotaFull*100)) : 0;
    return {...c, versato, versatoPrevis, versatoFull, quota, quotaFull, diff, perc, diffFull:diffFull2, percFull:percFull2, nSpese};
  });

  const TABS = [
    {id:'overview',  label:'📊 Panoramica'},
    {id:'forecast',  label:'🔮 Forecast'},
    {id:'prevcons',  label:'⚖️ Prev. vs Cons.'},
    {id:'condomini', label:'👥 Per condomino'},
    {id:'categorie', label:'🏷️ Per categoria'},
  ];

  // ── RENDER TABS ──────────────────────────────────────────────────────────
  const tabHtml = `
  <div class="bil-tabs">
    ${TABS.map(t=>`<button class="bil-tab ${tab===t.id?'active':''}" data-tab="${t.id}">${t.label}</button>`).join('')}
  </div>`;

  // ── TAB: PANORAMICA ───────────────────────────────────────────────────────
  function tabOverview() {
    const alertStatus = saldo < 0 ? 'critical' : meseZero !== null ? 'warn' : 'ok';
    const alertMsg = saldo < 0
      ? `⚠️ Saldo negativo di ${fmt(Math.abs(saldo))}`
      : meseZero !== null
      ? `⚠️ Proiezione: cassa a zero a ${nomiMesi[meseZero]}`
      : `✅ Situazione stabile — runway ${runwayMesi>11?'>12':runwayMesi} mesi`;

    return `
    <!-- ACTUALS -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:.5rem">
      <span class="bil-actual-label">▌ ACTUALS — Solo dati reali confermati</span>
    </div>
    <div class="kpi-strip" style="margin-bottom:.875rem">
      <div class="kpi-card kpi-green"><div class="kpi-label">Entrate effettive</div><div class="kpi-value" style="color:var(--green)">${fmt(totEntrateActual)}</div><div class="kpi-sub">${entrateActual.length} versamenti</div></div>
      <div class="kpi-card kpi-red"><div class="kpi-label">Uscite consuntivate</div><div class="kpi-value" style="color:var(--red)">${fmt(totCons)}</div><div class="kpi-sub">${speseActual.length} spese chiuse</div></div>
      <div class="kpi-card ${saldo>=0?'kpi-green':'kpi-red'}">
        <div class="kpi-label">Saldo reale</div>
        <div class="kpi-value" style="color:${saldo>=0?'var(--green)':'var(--red)'}">${fmt(saldo)}</div>
        <div class="kpi-trend ${saldo>=0?'down':'up'}">${saldo>=0?'▲ Positivo':'▼ Deficit'}</div>
        ${saldoRiporto!==0?`<div style="font-size:10px;color:var(--text2);margin-top:2px">Anno: ${fmt(saldoAnno)} · Riporto: <span style="color:${saldoRiporto>=0?'var(--green)':'var(--red)'}">${saldoRiporto>=0?'+':''}${fmt(saldoRiporto)}</span></div>`:''}
      </div>
      <div class="kpi-card kpi-blue"><div class="kpi-label">Quota media / cond.</div><div class="kpi-value" style="color:var(--accent)">${fmt(totCons/nAttivi)}</div><div class="kpi-sub">Media su ${nAttivi} condomini</div></div>
    </div>

    <!-- ACTUALS + FORECAST -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:.5rem">
      <span class="bil-forecast-label">▌ ACTUALS + FORECAST — Include tutti i previsionali</span>
    </div>
    <div class="kpi-strip" style="margin-bottom:1rem">
      <div class="kpi-card" style="border-top:3px solid #7c3aed"><div class="kpi-label">Entrate (incl. prev.)</div><div class="kpi-value" style="color:#7c3aed">${fmt(totEntrateFull)}</div><div class="kpi-sub">+${fmt(totEntratePrevis)} previsionali</div></div>
      <div class="kpi-card" style="border-top:3px solid #7c3aed"><div class="kpi-label">Uscite (incl. prev.)</div><div class="kpi-value" style="color:#7c3aed">${fmt(totUsciteFull)}</div><div class="kpi-sub">+${fmt(totPrevForecast)} da consuntivare</div></div>
      <div class="kpi-card" style="border-top:3px solid #7c3aed"><div class="kpi-label">Saldo proiettato</div><div class="kpi-value" style="color:${saldoFull>=0?'#7c3aed':'var(--red)'}">${fmt(saldoFull)}</div><div class="kpi-sub">Con tutti i previsionali</div></div>
      <div class="kpi-card kpi-amber"><div class="kpi-label">Runway stimato</div><div class="kpi-value" style="color:${runwayMesi===0?'var(--red)':runwayMesi===-1?'var(--amber)':'var(--amber)'};">${runwayMesi>11?'>12':runwayMesi===-1?'<1':runwayMesi} mesi</div><div class="kpi-sub">${fmt(mediaUscite)}/mese reale</div></div>
    </div>

    <div class="cf-zero-warn ${alertStatus}" style="margin-bottom:1rem">${alertMsg}</div>

    <!-- RIPORTO ANNI PRECEDENTI -->
    ${saldoRiporto !== 0 ? `
    <div style="display:flex;align-items:center;gap:12px;background:${saldoRiporto>=0?'#f0fdf4':'#fef2f2'};border:1px solid ${saldoRiporto>=0?'#bbf7d0':'#fecaca'};border-radius:var(--radius-sm);padding:.75rem 1rem;margin-bottom:1rem;font-size:13px;flex-wrap:wrap">
      <div style="font-size:20px">${saldoRiporto>=0?'📥':'📤'}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600">Riporto anni precedenti (fino al ${anno-1})</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">
          Saldo cumulativo di tutti gli anni prima del ${anno} · Anno corrente: ${fmt(saldoAnno)} · Totale cassa: ${fmt(saldo)}
        </div>
      </div>
      <div style="font-weight:800;font-size:1.2rem;color:${saldoRiporto>=0?'var(--green)':'var(--red)'}">${saldoRiporto>=0?'+':''}${fmt(saldoRiporto)}</div>
    </div>` : `
    <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:.5rem 1rem;margin-bottom:1rem;font-size:12px;color:var(--text2)">
      📋 Nessun riporto da anni precedenti · Il saldo parte da €0,00
    </div>`}

    <!-- GRAFICO: barre sovrapposte actual + forecast -->
    <div class="cf-chart">
      <div class="cf-chart-title">Andamento mensile ${anno}</div>
      <div class="cf-chart-sub">🟢 Actual · 🟣 Forecast previsionali · 🔴 Uscite consuntivate</div>
      <div class="cf-bars">
        ${cfCumul.map(cf=>{
          const hIA = Math.round(cf.incassi/maxCF*100);
          const hIP = Math.round(cf.incPrevis/maxCF*100);
          const hCA = Math.round(cf.cons/maxCF*100);
          const hCP = Math.round(cf.prevForecast/maxCF*100);
          const sm  = cf.totIncassi - cf.totUscite;
          return `<div class="cf-col">
            <div class="cf-col-saldo" style="color:${sm>=0?'#7c3aed':'var(--red)'}">${sm>=0?'+':''}${Math.round(sm/1000)}k</div>
            <div class="cf-col-bars">
              <div style="display:flex;flex-direction:column;align-items:center">
                <div class="cf-bar" style="height:${hIP}px;background:#7c3aed;opacity:.7;width:14px" title="Entrate prev. ${fmt(cf.incPrevis)}"></div>
                <div class="cf-bar" style="height:${hIA}px;background:var(--green);opacity:.85;width:14px" title="Entrate reali ${fmt(cf.incassi)}"></div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:center">
                <div class="cf-bar" style="height:${hCP}px;background:#a78bfa;opacity:.7;width:14px" title="Uscite prev. ${fmt(cf.prevForecast)}"></div>
                <div class="cf-bar" style="height:${hCA}px;background:var(--red);opacity:.85;width:14px" title="Uscite reali ${fmt(cf.cons)}"></div>
              </div>
            </div>
            <div class="cf-col-label" style="font-weight:${cf.isCurrent?700:400};color:${cf.isCurrent?'var(--accent)':'var(--text2)'}">${cf.mese}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="cf-legend">
        <div class="cf-legend-item"><div class="cf-legend-dot" style="background:var(--green)"></div>Entrate reali</div>
        <div class="cf-legend-item"><div class="cf-legend-dot" style="background:#7c3aed"></div>Entrate previsionali</div>
        <div class="cf-legend-item"><div class="cf-legend-dot" style="background:var(--red)"></div>Uscite reali</div>
        <div class="cf-legend-item"><div class="cf-legend-dot" style="background:#a78bfa"></div>Uscite da consuntivare</div>
      </div>
    </div>`;
  }

  // ── TAB: FORECAST ─────────────────────────────────────────────────────────
  function tabForecast() {
    // Solo spese con preventivo e SENZA consuntivo = non ancora consuntivate
    const speseToForecast = speseOnlyPrev;
    const totForecastUscite  = speseToForecast.reduce((a,s)=>a+parseFloat(s.preventivo||0),0);
    const totForecastEntrate = totEntratePrevis;
    const saldoConForecast   = saldo + totForecastEntrate - totForecastUscite;
    return `
    <div class="alert" style="background:#f5f3ff;border:1px solid #c4b5fd;border-radius:var(--radius-sm);padding:.75rem 1rem;margin-bottom:1rem;font-size:13px;color:#5b21b6">
      🔮 Il forecast include: <strong>${speseToForecast.length} spese</strong> con solo preventivo (non consuntivate) e <strong>${entratePrevis.length} versamenti</strong> previsionali.
      ${saldoRiporto!==0?`<br>📥 Riporto anni precedenti incluso: <strong>${saldoRiporto>=0?'+':''}${fmt(saldoRiporto)}</strong>`:''}
    </div>
    <div class="kpi-strip" style="margin-bottom:1rem">
      <div class="kpi-card ${saldo>=0?'kpi-green':'kpi-red'}">
        <div class="kpi-label">Saldo reale ora</div>
        <div class="kpi-value" style="color:${saldo>=0?'var(--green)':'var(--red)'}">${fmt(saldo)}</div>
        <div class="kpi-sub">
          Anno ${anno}: ${fmt(saldoAnno)}
          ${saldoRiporto!==0?`<br>Riporto: ${saldoRiporto>=0?'+':''}${fmt(saldoRiporto)}`:''}
        </div>
      </div>
      <div class="kpi-card" style="border-top:3px solid #7c3aed"><div class="kpi-label">Uscite da consuntivare</div><div class="kpi-value" style="color:#7c3aed">${fmt(totForecastUscite)}</div><div class="kpi-sub">${speseToForecast.length} spese aperte</div></div>
      <div class="kpi-card" style="border-top:3px solid #7c3aed"><div class="kpi-label">Entrate previsionali</div><div class="kpi-value" style="color:#7c3aed">${fmt(totForecastEntrate)}</div><div class="kpi-sub">${entratePrevis.length} versamenti attesi</div></div>
      <div class="kpi-card ${saldoConForecast>=0?'kpi-green':'kpi-red'}"><div class="kpi-label">Saldo proiettato</div><div class="kpi-value" style="color:${saldoConForecast>=0?'var(--green)':'var(--red)'}">${fmt(saldoConForecast)}</div><div class="kpi-sub">Dopo tutti i previsionali</div></div>
    </div>

    <div class="card" style="margin-bottom:1.25rem">
      <div class="card-header"><h3>📅 Cashflow mese per mese — Actual + Forecast ${anno}</h3></div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Mese</th>
            <th style="color:var(--green)">Entrate reali</th>
            <th style="color:#7c3aed">Ent. previsionali</th>
            <th style="color:var(--red)">Uscite reali</th>
            <th style="color:#7c3aed">Uscite da cons.</th>
            <th>Saldo mese</th><th>Cassa cumulativa</th>
          </tr></thead>
          <tbody>
          <tr style="background:#f0fdf4;font-weight:600">
            <td colspan="2" style="color:var(--green)">
              ${saldoRiporto!==0
                ? `Riporto anni precedenti`
                : `Inizio anno (nessun riporto)`}
            </td>
            <td></td><td></td><td></td>
            <td style="color:${saldoRiporto>=0?'var(--green)':'var(--red)'}">${saldoRiporto>=0?'+':''}${fmt(saldoRiporto)}</td>
            <td style="color:${saldoRiporto>=0?'var(--green)':'var(--red)'};font-weight:700">${fmt(saldoRiporto)}</td>
          </tr>
          ${cfCumul.map((cf,i)=>{
            const hasData = cf.incassi>0||cf.cons>0||cf.incPrevis>0||cf.prevForecast>0;
            const sm = cf.totIncassi - cf.totUscite;
            const hasForecast = cf.incPrevis>0||cf.prevForecast>0;
            const rowClass = hasForecast ? 'forecast-row-future' : cf.isCurrent ? 'forecast-row-current' : '';
            const statoIcon = cf.cumulFull < 0 ? '🔴' : cf.cumulFull < mediaUscite ? '🟡' : '🟢';
            return `<tr class="${rowClass}">
              <td style="font-weight:${cf.isCurrent?700:400};white-space:nowrap">
                ${cf.mese}${cf.isCurrent?'<span class="badge badge-blue" style="font-size:9px;margin-left:4px">oggi</span>':''}
              </td>
              <td class="amount-pos">${cf.incassi>0?fmt(cf.incassi):'—'}</td>
              <td style="color:#7c3aed;font-weight:500">${cf.incPrevis>0?fmt(cf.incPrevis):'—'}</td>
              <td class="amount-neg">${cf.cons>0?fmt(cf.cons):'—'}</td>
              <td style="color:#7c3aed;font-weight:500">${cf.prevForecast>0?fmt(cf.prevForecast):'—'}</td>
              <td style="font-weight:600;color:${sm>=0?'var(--green)':'var(--red)'}">${hasData?(sm>=0?'+':'')+fmt(sm):'—'}</td>
              <td style="font-weight:700;color:${cf.cumulFull>=0?'var(--text)':'var(--red)'}">${fmt(cf.cumulFull)}</td>
            </tr>`;
          }).join('')}
          </tbody>
          <tfoot>
            <tr style="border-top:2px solid var(--border);font-weight:700">
              <td>Totale anno</td>
              <td class="amount-pos">${fmt(totEntrateActual)}</td>
              <td style="color:#7c3aed">${fmt(totEntratePrevis)}</td>
              <td class="amount-neg">${fmt(totCons)}</td>
              <td style="color:#7c3aed">${fmt(totPrevForecast)}</td>
              <td style="color:${saldoFull>=0?'var(--green)':'var(--red)'};font-weight:700">${saldoFull>=0?'+':''}${fmt(saldoFull)}</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>

    <div class="runway-card">
      <div style="font-weight:700;font-size:15px;margin-bottom:.25rem">🗓️ Visualizzazione cassa mese per mese</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:.875rem">Proiezione basata sulla media storica per i mesi futuri</div>
      <div class="runway-months">
        ${cfCumul.map(cf=>{
          let cls = cf.isForecast ? 'future' : cf.cumul>0 ? (cf.cumul<mediaUscite*0.5?'warning':'positive') : 'negative';
          const ico = cf.isForecast ? '?' : cf.cumul>0 ? (cf.cumul<mediaUscite*0.5?'⚠':'✓') : '✗';
          return `<div class="runway-month">
            <div class="runway-dot ${cls}" title="${cf.mese}: ${fmt(cf.cumul)}">${ico}</div>
            <div class="runway-month-label">${cf.mese}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // ── TAB: PREVENTIVO VS CONSUNTIVO ─────────────────────────────────────────
  function tabPrevCons() {
    const soloConsPuro = spese.filter(s=>parseFloat(s.consuntivo||0)>0);
    const soloPrePuro  = spese.filter(s=>parseFloat(s.preventivo||0)>0 && !parseFloat(s.consuntivo||0));
    const entrambi     = spese.filter(s=>parseFloat(s.preventivo||0)>0 && parseFloat(s.consuntivo||0)>0);

    const maxBar = Math.max(totPrev, totCons, 1);
    const pPrev = Math.round(totPrev/maxBar*100);
    const pCons = Math.round(totCons/maxBar*100);

    return `
    <div class="kpi-strip" style="margin-bottom:1.25rem">
      <div class="kpi-card kpi-amber"><div class="kpi-label">Totale preventivo</div><div class="kpi-value" style="color:var(--amber)">${fmt(totPrev)}</div><div class="kpi-sub">Stima iniziale</div></div>
      <div class="kpi-card kpi-red"><div class="kpi-label">Totale consuntivo</div><div class="kpi-value" style="color:var(--red)">${fmt(totCons)}</div><div class="kpi-sub">Importo definitivo</div></div>
      <div class="kpi-card ${scartoPrevCons<=0?'kpi-green':'kpi-red'}"><div class="kpi-label">Scarto</div><div class="kpi-value" style="color:${scartoPrevCons>0?'var(--red)':'var(--green)'};font-size:1.1rem">${scartoPrevCons>0?'+':''}${fmt(scartoPrevCons)}</div><div class="kpi-sub">${scartoPrevCons>0?'Sforato preventivo':'Risparmiato'}</div></div>
      <div class="kpi-card kpi-blue"><div class="kpi-label">% consuntivate</div><div class="kpi-value" style="color:var(--accent)">${spese.length?Math.round(soloConsPuro.length/spese.length*100):0}%</div><div class="kpi-sub">${soloConsPuro.length} su ${spese.length} spese definitive</div></div>
    </div>

    <div class="card" style="margin-bottom:1.25rem">
      <div class="card-header"><h3>Confronto visivo preventivo vs consuntivo</h3></div>
      <div style="padding:1.25rem">
        <div style="margin-bottom:1rem">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="color:var(--amber);font-weight:600">Preventivo</span><span style="font-weight:600">${fmt(totPrev)}</span></div>
          <div class="pvc-bar"><div class="pvc-prev" style="width:${pPrev}%"></div></div>
        </div>
        <div style="margin-bottom:1rem">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="color:var(--red);font-weight:600">Consuntivo</span><span style="font-weight:600">${fmt(totCons)}</span></div>
          <div class="pvc-bar"><div class="pvc-cons" style="width:${pCons}%"></div></div>
        </div>
        <div style="display:flex;gap:1.5rem;font-size:13px;flex-wrap:wrap;padding-top:.75rem;border-top:1px solid var(--border)">
          <div>📋 <strong>${entrambi.length}</strong> spese con entrambi</div>
          <div>🔮 <strong>${soloPrePuro.length}</strong> solo preventivo (da chiudere)</div>
          <div>✅ <strong>${soloConsPuro.length}</strong> solo consuntivo</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h3>Dettaglio spese — preventivo vs consuntivo</h3></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Data</th><th>Titolo</th><th>Categoria</th><th>Preventivo</th><th>Consuntivo</th><th>Scarto</th><th>Stato</th></tr></thead>
          <tbody>
          ${[...spese].sort((a,b)=>new Date(b.data)-new Date(a.data)).map(s=>{
            const cat   = getCategorie().find(c=>c.id===s.categoria)||{label:s.categoria||'—',icon:'📦'};
            const prev  = parseFloat(s.preventivo||0);
            const cons  = parseFloat(s.consuntivo||0);
            const scarto = cons - prev;
            const hasPrev = prev > 0;
            const hasCons = cons > 0;
            return `<tr>
              <td style="font-size:12px;white-space:nowrap">${s.data}</td>
              <td style="font-weight:500;font-size:13px">${esc(s.titolo)}</td>
              <td><span class="badge badge-gray" style="font-size:11px">${cat.icon||'📦'} ${cat.label}</span></td>
              <td>${hasPrev?`<span style="color:var(--amber);font-weight:500">${fmt(prev)}</span>`:'<span style="color:var(--text2)">—</span>'}</td>
              <td>${hasCons?`<span style="color:var(--red);font-weight:600">${fmt(cons)}</span>`:'<span style="color:var(--text2)">—</span>'}</td>
              <td>${hasPrev&&hasCons?`<span style="color:${scarto>0?'var(--red)':'var(--green)'};font-weight:600">${scarto>0?'+':''}${fmt(scarto)}</span>`:'<span style="color:var(--text2)">—</span>'}</td>
              <td>${hasCons?'<span class="badge badge-green" style="font-size:11px">✓ Definitiva</span>':'<span class="badge badge-amber" style="font-size:11px">~ Previsionale</span>'}</td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }

  // ── TAB: PER CONDOMINO ────────────────────────────────────────────────────
  function tabCondomini() {
    const totVersato = condominiKPI.reduce((a,c)=>a+c.versato, 0);
    const inRegola   = condominiKPI.filter(c=>c.diff>=0).length;
    const inRitardo  = condominiKPI.filter(c=>c.diff<0).length;
    const totDovuto  = condominiKPI.reduce((a,c)=>a+c.quota, 0);
    const daIncassare= condominiKPI.filter(c=>c.diff<0).reduce((a,c)=>a+Math.abs(c.diff),0);

    return `
    <div class="kpi-strip" style="margin-bottom:1.25rem">
      <div class="kpi-card kpi-green"><div class="kpi-label">In regola</div><div class="kpi-value" style="color:var(--green)">${inRegola}/${nAttivi}</div><div class="kpi-sub">Hanno versato la quota</div></div>
      <div class="kpi-card ${inRitardo>0?'kpi-red':'kpi-green'}"><div class="kpi-label">In ritardo</div><div class="kpi-value" style="color:${inRitardo>0?'var(--red)':'var(--green)'}">${inRitardo}</div><div class="kpi-sub">Quota non coperta</div></div>
      <div class="kpi-card kpi-red"><div class="kpi-label">Da incassare ancora</div><div class="kpi-value" style="color:var(--red)">${fmt(daIncassare)}</div><div class="kpi-sub">Totale scoperto</div></div>
      <div class="kpi-card kpi-blue"><div class="kpi-label">Copertura media</div><div class="kpi-value" style="color:var(--accent)">${totDovuto>0?Math.round(totVersato/totDovuto*100):0}%</div><div class="kpi-sub">${fmt(totVersato)} su ${fmt(totDovuto)}</div></div>
    </div>

    <div class="bil-condo-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-bottom:1.25rem">
      ${condominiKPI.map(c=>{
        const coloreActual  = c.diff>=0 ? 'var(--green)' : 'var(--red)';
        const saldoProiett  = c.versato + c.versatoPrevis - c.quotaFull;
        const percActual    = c.quota>0 ? Math.min(100,Math.round(c.versato/c.quota*100)) : 0;
        const percPrev      = c.quotaFull>0 ? Math.min(100,Math.round((c.versato+c.versatoPrevis)/c.quotaFull*100)) : 0;
        const coloreBar     = percActual>=100?'var(--green)':percActual>=60?'var(--amber)':'var(--red)';
        const statoLabel    = c.diff>=0 ? '✓ OK' : '⚠ Scoperto';

        return `<div class="condo-kpi-card">

          <!-- HEADER -->
          <div class="condo-kpi-head" style="margin-bottom:.75rem">
            <div class="avatar" style="${avatarStyle(c.color)};width:38px;height:38px;font-size:14px">${initials(c.nome)}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:14px">${esc(c.nome)}</div>
              <div style="font-size:11px;color:var(--text2)">${c.appartamento}</div>
            </div>
            <span class="badge ${c.diff>=0?'badge-green':'badge-red'}" style="font-size:11px">${statoLabel}</span>
          </div>

          <!-- SEZIONE ACTUAL -->
          <div style="background:#f0fdf4;border-radius:6px;padding:.5rem .75rem;margin-bottom:.5rem">
            <div style="font-size:9px;font-weight:700;color:var(--green);letter-spacing:.06em;margin-bottom:5px">✅ ACTUAL</div>
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
              <span style="color:var(--text2)">Versato</span>
              <span style="font-weight:700;color:var(--green)">${fmt(c.versato)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
              <span style="color:var(--text2)">Quota spese</span>
              <span style="font-weight:600;color:var(--red)">−${fmt(c.quota)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;border-top:1px solid #bbf7d0;margin-top:4px;padding-top:4px">
              <span>Saldo reale</span>
              <span style="color:${coloreActual}">${c.diff>=0?'+':''}${fmt(c.diff)}</span>
            </div>
            <!-- Barra actual -->
            <div style="margin-top:6px">
              <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-bottom:2px">
                <span>Copertura</span><span style="font-weight:600;color:${coloreBar}">${percActual}%</span>
              </div>
              <div class="condo-kpi-bar">
                <div class="condo-kpi-fill" style="width:${percActual}%;background:${coloreBar}"></div>
              </div>
            </div>
          </div>

          <!-- SEZIONE PROIEZIONE (sempre visibile) -->
          <div style="background:#f5f3ff;border-radius:6px;padding:.5rem .75rem">
            <div style="font-size:9px;font-weight:700;color:#7c3aed;letter-spacing:.06em;margin-bottom:5px">🔮 PROIEZIONE A FINE ANNO</div>
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
              <span style="color:var(--text2)">Entrate previsionali</span>
              <span style="font-weight:600;color:#7c3aed">${c.versatoPrevis>0?'+'+fmt(c.versatoPrevis):'—'}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
              <span style="color:var(--text2)">Quota spese full</span>
              <span style="font-weight:600;color:var(--red)">−${fmt(c.quotaFull)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;border-top:1px solid #ddd6fe;margin-top:4px;padding-top:4px">
              <span>Saldo proiettato</span>
              <span style="color:${saldoProiett>=0?'#7c3aed':'var(--red)'}">${saldoProiett>=0?'+':''}${fmt(saldoProiett)}</span>
            </div>
            <!-- Barra proiezione -->
            ${c.quotaFull>0?`<div style="margin-top:6px">
              <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-bottom:2px">
                <span>Copertura proiettata</span><span style="font-weight:600;color:#7c3aed">${percPrev}%</span>
              </div>
              <div class="condo-kpi-bar">
                <div class="condo-kpi-fill" style="width:${percActual}%;background:${coloreBar};border-radius:10px 0 0 10px"></div>
                <div style="width:${Math.max(0,percPrev-percActual)}%;background:#7c3aed;opacity:.5;height:100%"></div>
              </div>
              <div style="display:flex;gap:.75rem;font-size:10px;color:var(--text2);margin-top:3px">
                <span style="color:${coloreBar}">■ Actual ${percActual}%</span>
                ${c.versatoPrevis>0?`<span style="color:#7c3aed">■ Prev. ${percPrev-percActual}%</span>`:''}
              </div>
            </div>`:''}
          </div>

        </div>`;
      }).join('')}
    </div>

    <div class="card">
      <div class="card-header"><h3>Storico versamenti per condomino — ${anno}</h3></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Condomino</th><th>Quota dovuta</th><th>Versato</th><th>Copertura</th><th>Differenza</th><th>N° vers.</th></tr></thead>
          <tbody>
          ${condominiKPI.map(c=>{
            const nVers = entrate.filter(e=>e.condominoId===c.id).length;
            return `<tr>
              <td><div style="display:flex;align-items:center;gap:8px">
                <div class="avatar" style="${avatarStyle(c.color)};width:26px;height:26px;font-size:10px">${initials(c.nome)}</div>
                <div><div style="font-weight:500;font-size:13px">${esc(c.nome)}</div><div style="font-size:11px;color:var(--text2)">${c.appartamento}</div></div>
              </div></td>
              <td style="font-size:13px">
                <div>${fmt(c.quota)}</div>
                ${c.quotaFull > c.quota ? `<div style="font-size:11px;color:#7c3aed">+prev: ${fmt(c.quotaFull)}</div>` : ''}
              </td>
              <td style="color:var(--green);font-weight:500">${fmt(c.versato)}</td>
              <td>
                <div style="display:flex;align-items:center;gap:6px">
                  <div style="width:60px;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden"><div style="width:${c.perc}%;height:100%;background:${c.perc>=100?'var(--green)':c.perc>=60?'var(--amber)':'var(--red)'}"></div></div>
                  <span style="font-size:12px;font-weight:600">${c.perc}%</span>
                </div>
              </td>
              <td><span style="font-weight:700;color:${c.diff>=0?'var(--green)':'var(--red)'}">${c.diff>=0?'+':''}${fmt(c.diff)}</span></td>
              <td style="font-size:13px;color:var(--text2)">${nVers}</td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }

  // ── TAB: PER CATEGORIA ────────────────────────────────────────────────────
  function tabCategorie() {
    const totActual  = catBreak.reduce((a,c)=>a+c.totCons,0);
    const totForecast= catBreak.reduce((a,c)=>a+c.totFcst,0);
    const totFull    = totActual + totForecast;
    const scartoCons = catBreak.reduce((a,c)=>a+(c.totCons-c.totPrev),0); // solo su chiuse

    return `
    <div class="card">
      <div class="card-header">
        <h3>🏷️ Spese per categoria — ${anno}</h3>
      </div>

      <!-- KPI strip -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;padding:.875rem 1.25rem;border-bottom:1px solid var(--border);background:var(--surface2)">
        <div style="text-align:center">
          <div style="font-size:10px;font-weight:700;color:var(--red);letter-spacing:.06em;margin-bottom:3px">ACTUAL</div>
          <div style="font-size:1.3rem;font-weight:800;color:var(--red)">${fmt(totActual)}</div>
          <div style="font-size:11px;color:var(--text2)">${catBreak.filter(c=>c.nCons>0).length} categorie · ${catBreak.reduce((a,c)=>a+c.nCons,0)} spese</div>
        </div>
        <div style="text-align:center;border-left:1px solid var(--border);border-right:1px solid var(--border)">
          <div style="font-size:10px;font-weight:700;color:#7c3aed;letter-spacing:.06em;margin-bottom:3px">FORECAST</div>
          <div style="font-size:1.3rem;font-weight:800;color:#7c3aed">${totForecast>0?fmt(totForecast):'—'}</div>
          <div style="font-size:11px;color:var(--text2)">${catBreak.filter(c=>c.nFcst>0).length} categorie · ${catBreak.reduce((a,c)=>a+c.nFcst,0)} spese</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:10px;font-weight:700;color:#0891b2;letter-spacing:.06em;margin-bottom:3px">PROIEZIONE</div>
          <div style="font-size:1.3rem;font-weight:800;color:#0891b2">${fmt(totFull)}</div>
          <div style="font-size:11px;color:var(--text2)">Actual + forecast</div>
        </div>
      </div>

      <!-- Righe categorie -->
      <div style="padding:.875rem 1.25rem">
        ${catBreak.length===0?'<div class="empty"><p>Nessuna spesa</p></div>':
        catBreak.map(c=>{
          const percCons = totFull>0 ? c.totCons/totFull*100 : 0;
          const percFcst = totFull>0 ? c.totFcst/totFull*100 : 0;
          const scarto   = c.totCons>0 && c.totPrev>0 ? c.totCons - c.totPrev : null;
          const color    = c.tipo==='straordinaria' ? 'var(--purple)' : 'var(--accent)';
          return `
          <div style="margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)">
            <!-- Header categoria -->
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.625rem">
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:20px">${c.icon||'📦'}</span>
                <div>
                  <div style="font-weight:700;font-size:14px">${c.label}</div>
                  <div style="font-size:11px;color:var(--text2)">${c.tipo==='straordinaria'?'Straordinaria':'Ordinaria'}</div>
                </div>
              </div>
              <!-- Due mini-box actual + forecast -->
              <div style="display:flex;gap:.5rem;align-items:center">
                ${c.totCons>0?`
                <div style="text-align:center;background:#fef2f2;border-radius:6px;padding:4px 10px;min-width:80px">
                  <div style="font-size:9px;font-weight:700;color:var(--red);letter-spacing:.05em">ACTUAL</div>
                  <div style="font-size:14px;font-weight:800;color:var(--red)">${fmt(c.totCons)}</div>
                  <div style="font-size:10px;color:var(--text2)">${c.nCons} spese</div>
                </div>`:''}
                ${c.totFcst>0?`
                <div style="text-align:center;background:#f5f3ff;border-radius:6px;padding:4px 10px;min-width:80px">
                  <div style="font-size:9px;font-weight:700;color:#7c3aed;letter-spacing:.05em">FORECAST</div>
                  <div style="font-size:14px;font-weight:800;color:#7c3aed">${fmt(c.totFcst)}</div>
                  <div style="font-size:10px;color:var(--text2)">${c.nFcst} spese</div>
                </div>`:''}
                <div style="text-align:center;background:var(--surface2);border-radius:6px;padding:4px 10px;min-width:80px;border:1px solid var(--border)">
                  <div style="font-size:9px;font-weight:700;color:#0891b2;letter-spacing:.05em">TOTALE</div>
                  <div style="font-size:14px;font-weight:800;color:#0891b2">${fmt(c.tot)}</div>
                  <div style="font-size:10px;color:var(--text2)">${Math.round((c.tot/totFull)*100)}% del tot.</div>
                </div>
              </div>
            </div>

            <!-- Barra doppia actual + forecast -->
            <div style="height:10px;background:var(--surface2);border-radius:5px;overflow:hidden;display:flex;margin-bottom:5px">
              ${percCons>0?`<div style="width:${percCons}%;background:${color};border-radius:5px 0 0 5px;transition:width .3s"></div>`:''}
              ${percFcst>0?`<div style="width:${percFcst}%;background:#7c3aed;opacity:.5;transition:width .3s"></div>`:''}
            </div>
            <div style="display:flex;gap:1rem;font-size:11px;color:var(--text2)">
              ${percCons>0?`<span style="color:${color}">■ Actual ${percCons.toFixed(1)}%</span>`:''}
              ${percFcst>0?`<span style="color:#7c3aed">■ Forecast ${percFcst.toFixed(1)}%</span>`:''}
              ${scarto!==null?`<span style="margin-left:auto;font-weight:600;color:${scarto>0?'var(--red)':'var(--green)'}">Scarto: ${scarto>0?'+':''}${fmt(scarto)}</span>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // ── RENDER PAGE ───────────────────────────────────────────────────────────
  const bodyHtml = tab==='overview'  ? tabOverview()  :
                   tab==='forecast'  ? tabForecast()  :
                   tab==='prevcons'  ? tabPrevCons()  :
                   tab==='condomini' ? tabCondomini() :
                   tab==='categorie' ? tabCategorie() : tabOverview();

  return `
  <div>
    <div class="page-header">
      <div><div class="page-title">Bilancio</div><div class="page-sub">${(state.edifici.find(e=>e.id===state.edificioAttivo)||{nome:'—'}).nome} · ${anno}</div></div>
      <select style="padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;" id="anno-bilancio">
        ${anni.map(a=>`<option value="${a}" ${a===anno?'selected':''}>${a}</option>`).join('')}
      </select>
    </div>
    ${tabHtml}
    ${bodyHtml}
  </div>`;
}


// ===========================
// CONDOMINI
// ===========================
function renderCondomini() {
  const canEdit = canUserAdmin(state.user);
  const myEdId3 = getUserEdificio(state.user);
  // STRICT: solo condomini dell'edificio attivo (superAdmin vede quelli dell'edificio selezionato)
  const tuttiCondomini = state.condomini
    .filter(c => c.edificioId === state.edificioAttivo);
  const attivi      = tuttiCondomini.filter(c=>!c.disabled);
  const disabilitati= tuttiCondomini.filter(c=>c.disabled);
  const anno = new Date().getFullYear();

  return `
  <div>
    <div class="page-header">
      <div><div class="page-title">Condomini</div><div class="page-sub">${attivi.length} appartamenti attivi</div></div>
      ${canEdit?`<button class="btn btn-primary" id="btn-add-cond">+ Aggiungi condomino</button>`:''}
    </div>

    <div class="condomini-grid">
      ${attivi.map(c=>{

function renderModalStoricoFornitore(f) {
  const _edFornSt = f.edificioId || getUserEdificio(state.user);
  const speseF = state.spese.filter(s=>s.fornitoreId===f.id && (!s.edificioId||s.edificioId===_edFornSt))
    .sort((a,b)=>new Date(b.data)-new Date(a.data));
  const totale = speseF.reduce((a,s)=>a+parseFloat(s.consuntivo||s.preventivo||0), 0);
  const anno = new Date().getFullYear();
  const totAnno = speseF.filter(s=>new Date(s.data).getFullYear()===anno)
    .reduce((a,s)=>a+parseFloat(s.consuntivo||s.preventivo||0), 0);

  // Raggruppa per anno
  const perAnno = {};
  speseF.forEach(s => {
    const y = new Date(s.data).getFullYear();
    if (!perAnno[y]) perAnno[y] = [];
    perAnno[y].push(s);
  });

  return `
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" style="max-width:620px">
      <div class="modal-header">
        <h2>📊 Storico — ${esc(f.nome)}</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin-bottom:1.25rem">
          <div class="fornitore-stat"><div style="font-size:11px;color:var(--text2)">Interventi totali</div><div style="font-size:1.3rem;font-weight:700;color:var(--accent)">${speseF.length}</div></div>
          <div class="fornitore-stat"><div style="font-size:11px;color:var(--text2)">Anno ${anno}</div><div style="font-size:1.3rem;font-weight:700;color:var(--red)">${fmt(totAnno)}</div></div>
          <div class="fornitore-stat"><div style="font-size:11px;color:var(--text2)">Totale storico</div><div style="font-size:1.3rem;font-weight:700">${fmt(totale)}</div></div>
        </div>

        ${Object.keys(perAnno).sort((a,b)=>b-a).map(y => {
          const items = perAnno[y];
          const totY = items.reduce((a,s)=>a+parseFloat(s.consuntivo||s.preventivo||0), 0);
          return `<div style="margin-bottom:1.25rem">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
              <div style="font-weight:600;font-size:14px">📅 ${y}</div>
              <div style="font-weight:700;color:var(--red)">${fmt(totY)}</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px">
              ${items.map(s => {
                const cat = getCategorie().find(c=>c.id===s.categoria)||{label:s.categoria||'—', icon:'📦'};
                return `<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface2);border-radius:var(--radius-sm)">
                  <div style="font-size:16px">${cat.icon||'📦'}</div>
                  <div style="flex:1;min-width:0">
                    <div style="font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.titolo)}</div>
                    <div style="font-size:11px;color:var(--text2)">${s.data} · ${cat.label}</div>
                  </div>
                  <div style="font-weight:600;font-size:13px;color:var(--red);white-space:nowrap">${fmt(s.consuntivo||s.preventivo)}</div>
                </div>`;
              }).join('')}
            </div>
          </div>`;
        }).join('')}

        ${speseF.length === 0 ? '<div class="empty"><p>Nessuna spesa associata a questo fornitore</p></div>' : ''}
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modal-cancel">Chiudi</button>
      </div>
    </div>
  </div>`;
}
