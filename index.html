function renderModalNuovoUtente() {
  const step = state.wizardStep || 1;
  const wd   = state.wizardData || {};

  const steps = [
    { n:1, label:'Dati personali' },
    { n:2, label:'Ruolo' },
    { n:3, label:'Password' },
  ];

  const stepsHtml = steps.map((s,i) => {
    const cls = step > s.n ? 'done' : step === s.n ? 'active' : '';
    const lineClass = step > s.n ? 'done' : '';
    return `<div class="wstep ${cls}">
      <div class="wstep-circle">${step > s.n ? '✓' : s.n}</div>
      <div class="wstep-label">${s.label}</div>
    </div>${i < steps.length-1 ? `<div class="wstep-line ${lineClass}"></div>` : ''}`;
  }).join('');

  let body = '';
  if (step === 1) {
    body = `
      <div class="field"><label>Nome completo *</label>
        <input type="text" id="wiz-nome" value="${esc(wd.nome||'')}" placeholder="Es. Marco Verdi" autofocus></div>
      <div class="form-row">
        <div class="field"><label>Appartamento *</label>
          <input type="text" id="wiz-apt" value="${esc(wd.appartamento||'')}" placeholder="Es. Int. 3"></div>
        <div class="field"><label>Email</label>
          <input type="email" id="wiz-email" value="${esc(wd.email||'')}" placeholder="marco@example.com"></div>
      </div>
      <div class="field">
        <label>Username di accesso *</label>
        <input type="text" id="wiz-username" value="${esc(wd.username||'')}"
          placeholder="Es. mario.rossi · int1 · m.verdi"
          autocapitalize="none" autocorrect="off" spellcheck="false">
        <p class="hint">L'utente userà questo per entrare nell'app. Suggerimento: <strong>nome.cognome</strong> o <strong>int1</strong></p>
      </div>
      <div class="field">
        <label>Condominio *</label>
        <select id="wiz-edificio">
          ${state.edifici.map(e=>`<option value="${e.id}" ${(wd.edificioId||state.edificioAttivo)===e.id?'selected':''}>${e.emoji||'🏢'} ${esc(e.nome)}</option>`).join('')}
        </select>
      </div>
      <div id="wiz-err1" class="alert alert-warning" style="display:none"></div>`;
  } else if (step === 2) {
    const r = wd.ruolo||'lettura';
    body = `
      <p style="font-size:13px;color:var(--text2);margin-bottom:1rem">Scegli il livello di accesso per <strong>${esc(wd.nome||'')}</strong>:</p>
      <div class="ruolo-cards">
        <div class="ruolo-card ${r==='lettura'?'selected-lettura':''}" data-pick-ruolo="lettura">
          <div class="rc-icon">👁️</div>
          <div class="rc-title" style="color:#475569">Lettura</div>
          <div class="rc-desc">Consulta spese, entrate e bilancio</div>
        </div>
        <div class="ruolo-card ${r==='modifica'?'selected-modifica':''}" data-pick-ruolo="modifica">
          <div class="rc-icon">✏️</div>
          <div class="rc-title" style="color:var(--green)">Modifica</div>
          <div class="rc-desc">Aggiunge e modifica spese ed entrate</div>
        </div>
        <div class="ruolo-card ${r==='adminedificio'?'selected-admin':''}" data-pick-ruolo="adminedificio">
          <div class="rc-icon">🏢</div>
          <div class="rc-title" style="color:var(--accent)">Amm. Edificio</div>
          <div class="rc-desc">Gestisce utenti e dati del suo condominio</div>
        </div>
      </div>
      <div id="wiz-err2" class="alert alert-warning" style="display:none;margin-top:.75rem"></div>`;
  } else {
    body = `
      <p style="font-size:13px;color:var(--text2);margin-bottom:1rem">Imposta la password iniziale per <strong>${esc(wd.nome||'')}</strong>. Potrà cambiarla dopo il primo accesso.</p>
      <div class="field"><label>Password *</label>
        <input type="password" id="wiz-pw1" placeholder="Nuova password">
        <p class="hint">Almeno 8 caratteri · almeno una maiuscola · almeno un numero</p>
      </div>
      <div class="field"><label>Conferma password *</label>
        <input type="password" id="wiz-pw2" placeholder="Ripeti la password"></div>
      <div id="wiz-pw-rules" style="font-size:12px;min-height:18px;margin-bottom:.5rem"></div>

      <!-- Riepilogo -->
      <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:1rem;margin-top:.75rem;font-size:13px">
        <div style="font-weight:600;margin-bottom:.5rem">Riepilogo nuovo utente</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.35rem">
          <span style="color:var(--text2)">Nome</span><span>${esc(wd.nome||'')}</span>
          <span style="color:var(--text2)">Appartamento</span><span>${esc(wd.appartamento||'')}</span>
          <span style="color:var(--text2)">Username</span><span style="font-family:monospace">${esc(wd.username||'(non impostato)')}</span>
          <span style="color:var(--text2)">Email</span><span>${esc(wd.email||'—')}</span>

  const isLast = step === 3;

  return `
  <div class="modal-overlay" id="modal-overlay">

      <div class="modal-header">
        <h2>➕ Nuovo utente — Step ${step} di 3</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="wizard-steps">${stepsHtml}</div>
        ${body}
      </div>
      <div class="modal-footer" style="justify-content:space-between">
        <button class="btn btn-secondary" id="wiz-back" ${isFirst?'disabled style="opacity:.4;cursor:not-allowed"':''}>← Indietro</button>
        <button class="btn btn-primary" id="wiz-next" style="width:auto">${isLast?'✅ Crea utente':'Avanti →'}</button>
      </div>
    </div>
  </div>`;
}

function renderModalSpesa(d) {
  const isEdit = !!d?.id;
  const catSpesa = getCategorie().filter(c=>c.tipo!=='entrata');
  const selCat = d?.categoria||'';
  const defTipo = selCat ? (getCategorie().find(c=>c.id===selCat)?.tipo||'ordinaria') : 'ordinaria';

  // Build split rows from existing data or default equal split
  // Split: STRICT — solo condomini con edificioId esattamente uguale all'edificio attivo
  // Non usiamo il fallback !c.edificioId perché nello split la segregazione deve essere assoluta
  const _condSplit = state.condomini
    .filter(c => c.edificioId === state.edificioAttivo && !c.disabled && !c.superAdmin);
  // Se nessun condomino ha edificioId assegnato → avvisa che serve la migrazione
  const splitWarning = _condSplit.length === 0
    ? '<div class="alert alert-warning" style="font-size:12px;margin-bottom:.5rem">⚠️ Nessun condomino associato a questo edificio. Vai in Impostazioni → Migrazione per assegnare i condomini.</div>'
    : '';
  // Carica split da DB oppure calcola uguale
  // Se viene da DB, filtra solo i condomini dell'edificio attivo e ricalibra le %
  let splitData;
  if (d?.split && d.split.length > 0) {
    const validIds = new Set(_condSplit.map(c=>c.id));
    const filtered = d.split.filter(s => validIds.has(s.id));
    if (filtered.length === 0) {
      // Nessun condomino valido nel split salvato → rigenera uguale
      splitData = _condSplit.map(c=>({id:c.id, perc: parseFloat((100/Math.max(_condSplit.length,1)).toFixed(4)), locked:false}));
    } else {
      // Ricalibra: normalizza le % al 100% escludendo i rimossi
      const totPerc = filtered.reduce((a,s)=>a+(s.perc||0), 0);
      splitData = totPerc > 0
        ? filtered.map(s=>({...s, perc: parseFloat((s.perc/totPerc*100).toFixed(4))}))
        : _condSplit.map(c=>({id:c.id, perc: parseFloat((100/Math.max(_condSplit.length,1)).toFixed(4)), locked:false}));
    }
  } else {
    splitData = _condSplit.map(c=>({id:c.id, perc: parseFloat((100/Math.max(_condSplit.length,1)).toFixed(4)), locked:false}));
  }
  const importoRef = parseFloat(d?.consuntivo||d?.preventivo||0);

  function splitRow(c, sd) {
    // Usa il numero di condomini dell'edificio attivo per la % default
    const nCondEdificio = state.condomini.filter(c=>c.edificioId===state.edificioAttivo&&!c.disabled&&!c.superAdmin).length || 1;
    const perc = sd?.perc ?? (100/nCondEdificio);
    const euro = importoRef > 0 ? (perc/100*importoRef).toFixed(2) : '—';
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:6px">
        <div class="avatar" style="${avatarStyle(c.color)};width:22px;height:22px;font-size:9px">${initials(c.nome)}</div>
        <span style="font-weight:500">${esc(c.nome)}</span>
        <span style="font-size:11px;color:var(--text2)">${c.appartamento}</span>
      </div></td>
      <td>
        <input type="number" class="split-perc-inp" data-cid="${c.id}" value="${perc.toFixed(2)}" min="0" max="100" step="0.01" placeholder="0.00">
        <span style="color:var(--text2);font-size:12px"> %</span>
      </td>
      <td>
        <input type="number" class="split-euro-inp" data-cid="${c.id}" value="${importoRef>0?(perc/100*importoRef).toFixed(2):''}" min="0" step="0.01" placeholder="0.00">
        <span style="color:var(--text2);font-size:12px"> €</span>
      </td>
      <td style="text-align:center">
        <button class="split-lock-btn" data-lock-cid="${c.id}" title="Blocca questa quota">${sd?.locked?'🔒':'🔓'}</button>
      </td>
    </tr>`;
  }

  return `
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" style="max-width:620px">
      <div class="modal-header">
        <h2>${isEdit?'Modifica spesa':'Nuova spesa'}</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">

        <div class="field"><label>Titolo *</label><input type="text" id="m-titolo" value="${esc(d?.titolo||'')}" placeholder="Es. Bolletta luce gennaio"></div>
        <div class="field"><label>Descrizione</label><textarea id="m-desc" rows="2" placeholder="Dettagli aggiuntivi…">${esc(d?.descrizione||'')}</textarea></div>

        <div class="form-row">
          <div class="field">
            <label>Categoria *</label>
            <select id="m-cat">
              <option value="">— Seleziona —</option>
              ${catSpesa.map(c=>`<option value="${c.id}" data-tipo="${c.tipo}" ${c.id===selCat?'selected':''}>${c.label}</option>`).join('')}
            </select>
          </div>
          <div class="field">
            <label>Tipo spesa</label>
            <select id="m-tipo">
              <option value="ordinaria" ${(d?.tipoSpesa||defTipo)==='ordinaria'?'selected':''}>Ordinaria</option>
              <option value="straordinaria" ${(d?.tipoSpesa||defTipo)==='straordinaria'?'selected':''}>Straordinaria</option>
            </select>
            <p class="hint">Default dalla categoria</p>
          </div>
        </div>

        <div class="form-row">
          <div class="field">
            <label>Importo preventivo (€)</label>
            <input type="number" id="m-prev" value="${d?.preventivo||''}" placeholder="0.00" min="0" step="0.01">
            <p class="hint">Stima iniziale</p>
          </div>
          <div class="field">
            <label>Importo consuntivo (€)</label>
            <input type="number" id="m-cons" value="${d?.consuntivo||''}" placeholder="0.00" min="0" step="0.01">
            <p class="hint">Importo definitivo</p>
          </div>
        </div>

        <div class="form-row">
          <div class="field"><label>Data *</label><input type="date" id="m-data" value="${d?.data||new Date().toISOString().slice(0,10)}"></div>
          <div class="field">
            <label>Fornitore</label>
            <select id="m-fornitore">
              <option value="">— Nessun fornitore —</option>
              ${(state.fornitori||[]).filter(f=>!f.disabled && (!f.edificioId||f.edificioId===getUserEdificio(state.user))).map(f=>{
                const cat = CATEGORIE_FORNITORE.find(c=>c.id===f.categoria)||{icon:'📦'};
                return `<option value="${f.id}" ${f.id===d?.fornitoreId?'selected':''}>${cat.icon} ${esc(f.nome)}</option>`;
              }).join('')}
            </select>
            <p class="hint">Facoltativo — collega la spesa a un fornitore</p>

        <!-- ═══ RICORRENZA ═══ -->

            <input type="checkbox" id="m-ricorrente" ${d?.ricorrente?'checked':''} style="width:16px;height:16px">
            <span>🔁 Spesa ricorrente</span>
          </label>
        </div>
        <div id="ricorrenza-box" style="display:${d?.ricorrente?'block':'none'};background:var(--surface2);border-radius:var(--radius-sm);padding:.875rem;margin-bottom:1rem">

              <label>Frequenza *</label>
              <select id="m-freq">
                <option value="settimanale" ${d?.frequenza==='settimanale'?'selected':''}>Ogni settimana</option>
                <option value="mensile"     ${d?.frequenza==='mensile'||!d?.frequenza?'selected':''}>Ogni mese</option>
                <option value="bimestrale"  ${d?.frequenza==='bimestrale'?'selected':''}>Ogni 2 mesi</option>
                <option value="trimestrale" ${d?.frequenza==='trimestrale'?'selected':''}>Ogni 3 mesi</option>
                <option value="semestrale"  ${d?.frequenza==='semestrale'?'selected':''}>Ogni 6 mesi</option>
                <option value="annuale"     ${d?.frequenza==='annuale'?'selected':''}>Ogni anno</option>
              </select>
            </div>
            <div class="field">
              <label>Data fine *</label>
              <input type="date" id="m-freq-fine" value="${d?.ricorrenzaFine||''}" required>

        <!-- ═══ SEZIONE SUDDIVISIONE ═══ -->

              <thead><tr>

        <!-- ALLEGATI -->

            <div>Trascina i file qui oppure <strong>clicca per selezionare</strong></div>

        </div>

        <div class="alert alert-info" style="font-size:13px">
          💡 <strong>Preventivo</strong> → spesa <em>Previsionale</em>. <strong>Consuntivo</strong> → spesa <em>Definitiva</em>. Puoi avere solo uno dei due. &nbsp;|&nbsp; 🔒 Blocca una quota per fissarla mentre ricalcoli le altre.

function bindPageActions() {
  // Anno filter dashboard
  const ad = document.getElementById('anno-filter');
  if (ad) ad.onchange = e => setState({filterAnno: parseInt(e.target.value)||new Date().getFullYear()});
  // Toggle modalità multiselect
  const bToggleSel = document.getElementById('btn-toggle-multisel');
  if (bToggleSel) bToggleSel.onclick = () => {
    const sel = state.speseSelezionate;
    if (sel && sel.size >= 0) {
      // Disattiva: azzera selezione
      setState({speseSelezionate: new Set()});
    } else {
      setState({speseSelezionate: new Set()});
    }
    render();
  };

  // Checkbox singola spesa
  document.querySelectorAll('.chk-spesa').forEach(chk => {
    chk.onchange = () => {
      const id = parseInt(chk.dataset.spesaId);
      const sel = new Set(state.speseSelezionate || []);
      if (chk.checked) sel.add(id); else sel.delete(id);
      state.speseSelezionate = sel;
      // Aggiorna stile riga
      const row = chk.closest('tr');
      if (row) row.className = chk.checked ? 'spesa-row-sel' : '';
      // Aggiorna barra selezione senza full re-render
      const bar = document.querySelector('.sel-count-bar span');
      if (bar) bar.textContent = sel.size + ' spese selezionate';
      else if (sel.size > 0) render(); // mostra la barra
    };
  });

  // Seleziona tutte
  const bSelAll = document.getElementById('btn-sel-all');
  if (bSelAll) bSelAll.onclick = () => {
    const ids = items.map(s=>s.id);
    state.speseSelezionate = new Set(ids);
    render();
  };

  // Deseleziona tutte
  const bSelNone = document.getElementById('btn-sel-none');
  if (bSelNone) bSelNone.onclick = () => {
    state.speseSelezionate = new Set();
    render();
  };

  // Checkbox "seleziona tutte" nell'header
  const chkAll = document.getElementById('chk-all-spese');
  if (chkAll) chkAll.onchange = () => {
    if (chkAll.checked) {
      state.speseSelezionate = new Set(items.map(s=>s.id));
    } else {
      state.speseSelezionate = new Set();
    }
    render();
  };

  // Elimina selezionate
  const bDelSel = document.getElementById('btn-del-sel');
  if (bDelSel) bDelSel.onclick = () => {
    const sel = state.speseSelezionate;
    if (!sel || sel.size === 0) return;
    // Mostra dettaglio di cosa si sta eliminando
    const toDelete = state.spese.filter(s=>sel.has(s.id));
    const msg = 'Eliminare ' + sel.size + ' spese?\n\n' +
      toDelete.slice(0,5).map(s=>'- ' + s.titolo + ' (' + s.data + ')').join('\n') +
      (toDelete.length > 5 ? '\n- ... e altre ' + (toDelete.length-5) : '');
    if (!confirm(msg)) return;
    const spese = state.spese.filter(s=>!sel.has(s.id));
    save('cm_spese', spese);
    state.speseSelezionate = new Set();
    setState({spese});
  };

  // Ordinamento colonne spese
  document.querySelectorAll('[data-sort-col]').forEach(th => {
    th.onclick = () => {
      const colId = th.dataset.sortCol;
      const newDir = state.sortCol===colId && state.sortDir==='desc' ? 'asc' : 'desc';
      setState({sortCol: colId, sortDir: newDir});
    };
  });

  const ab = document.getElementById('anno-bilancio');
  if (ab) ab.onchange = e => setState({filterAnno: parseInt(e.target.value)||new Date().getFullYear()});
  document.querySelectorAll('.bil-tab').forEach(t => {
    t.onclick = () => setState({bilancioTab: t.dataset.tab});
  });

  // Spese filters
  const ss = document.getElementById('search-spese');
  if (ss) ss.oninput = e => setState({searchQ: e.target.value});
  const fas = document.getElementById('filter-anno-spese');
  if (fas) fas.onchange = e => setState({filterAnno: parseInt(e.target.value)||0});
  const fts = document.getElementById('filter-tipo-spese');
  if (fts) fts.onchange = e => setState({filterTipo: e.target.value});
  const fcs = document.getElementById('filter-cat-spese');
  if (fcs) fcs.onchange = e => setState({filterCat: e.target.value});
  if (fcs) fcs.onchange = e => setState({filterCat: e.target.value});
  const fss = document.getElementById('filter-stato-spese');
  if (fss) fss.onchange = e => setState({filterStato: e.target.value});
  const ffs = document.getElementById('filter-fornitore-spese');
  if (ffs) ffs.onchange = e => setState({filterFornitore: e.target.value});
  const bRF = document.getElementById('btn-reset-filtri');
  if (bRF) bRF.onclick = () => setState({filterTipo:'all',filterCat:'all',filterStato:'all',filterFornitore:'all',searchQ:''});

  // Entrate filters
  const se = document.getElementById('search-entrate');
  if (se) se.oninput = e => setState({searchQ: e.target.value});
  const fae = document.getElementById('filter-anno-entrate');
  if (fae) fae.onchange = e => setState({filterAnno: parseInt(e.target.value)||0});

  // Add buttons
  const bAddSpesa = document.getElementById('btn-add-spesa');
  if (bAddSpesa) bAddSpesa.onclick = () => setState({modal:{type:'spesa',data:null}, pendingFiles:[]});
  const bAddEntrata = document.getElementById('btn-add-entrata');
  if (bAddEntrata) bAddEntrata.onclick = () => setState({modal:{type:'entrata',data:null}});
  const bAddCond = document.getElementById('btn-add-cond');
  if (bAddCond) bAddCond.onclick = () => setState({modal:{type:'cond',data:null}});

  // Bilancio individuale condomino
  document.querySelectorAll('[data-bilancio-cond]').forEach(btn => {
    btn.onclick = () => {
      const id = parseInt(btn.dataset.bilancioCond);
      setState({page:'bilancio', bilancioTab:'condomini', bilancioCondId:id});
    };
  });

  // Reset password da superAdmin
  document.querySelectorAll('[data-reset-pw-cond]').forEach(btn => {
    btn.onclick = () => {
      const id = parseInt(btn.dataset.resetPwCond);
      const c  = state.condomini.find(x=>x.id===id);
      if (!c) return;
      setState({modal:{type:'reset-pw-admin', data:c}});
    };
  });

  // Edit/delete spese
  document.querySelectorAll('[data-edit-spesa]').forEach(btn => {
    btn.onclick = () => {
      const id = parseInt(btn.dataset.editSpesa);
      const item = state.spese.find(s=>s.id===id);
      if (item) setState({modal:{type:'spesa',data:{...item}}, pendingFiles:[]});
    };
  });
  document.querySelectorAll('[data-del-spesa]').forEach(btn => {
    btn.onclick = () => {
      if (!confirm('Eliminare questa spesa?')) return;
      const spese = state.spese.filter(s=>s.id!==parseInt(btn.dataset.delSpesa));
      save('cm_spese', spese);
      setState({spese});
    };
  });

  // Allegati in tabella
  bindAllegatiInTable(state.spese);

  // Delete entrate
  // Piano rate: crea versamenti previsionali automaticamente
  const bCreaPiano = document.getElementById('btn-crea-rate-piano');
  if (bCreaPiano) bCreaPiano.onclick = () => {
    const annoSel = state.filterAnno || new Date().getFullYear();
    const piano   = calcolaPianoRate(annoSel);
    if (!piano.rate.length) { alert('Nessuna rata da creare.'); return; }
    const condominiAttivi = (isSuperAdmin(state.user)
      ? state.condomini
      : state.condomini.filter(c=>c.edificioId===state.edificioAttivo)
    ).filter(c=>!c.disabled && !c.superAdmin);
    const n = piano.rate.length * condominiAttivi.length;
    const msgConf = 'Creare ' + n + ' versamenti previsionali?\n\n' +
      piano.rate.map(function(r){ return '• Rata ' + r.n + ' (' + r.data + '): ' + fmt(r.importoPerCondo) + ' x ' + condominiAttivi.length + ' condomini'; }).join('\n') +
      '\n\nPotrai validarli uno a uno quando arriveranno i pagamenti.';
    if (!confirm(msgConf)) return;
    const nuoviVers = [];
    for (const r of piano.rate) {
      for (const c of condominiAttivi) {
        nuoviVers.push({
          id: newId(),
          condominoId: c.id,
          importo: String(r.importoPerCondo),
          data: r.data,
          descrizione: 'Piano rate ' + annoSel + ' - Rata ' + r.n + ' (' + r.mese + ')',
          categoria: 'quote',
          edificioId: getUserEdificio(state.user),
          previsionale: true,
        });
      }
    }
    const entrate = [...state.entrate, ...nuoviVers];
    save('cm_entrate', entrate);
    setState({entrate});
    alert('Creati ' + nuoviVers.length + ' versamenti previsionali. Validali dalla lista quando arrivano i pagamenti.');
  };

  // Valida entrata previsionale → effettiva
  document.querySelectorAll('[data-valida-entrata]').forEach(btn => {
    btn.onclick = () => {
      const id = parseInt(btn.dataset.validaEntrata);
      if (!confirm('Confermi il versamento come effettivo? Verrà spostato dagli importi previsionali a quelli reali.')) return;
      const entrate = state.entrate.map(e => e.id===id ? {...e, previsionale:false} : e);
      save('cm_entrate', entrate);
      setState({entrate});
    };
  });

  // Modifica versamento
  document.querySelectorAll('[data-edit-entrata]').forEach(btn => {
    btn.onclick = () => {
      const id = parseInt(btn.dataset.editEntrata);
      const e  = state.entrate.find(x=>x.id===id);
      if (!e) return;
      setState({modal:{type:'entrata', data:e}});
    };
  });

  const bReset = document.getElementById('btn-reset');

    if (!confirm(

      'Verranno CANCELLATI:\n' +
      '• Tutte le spese\n' +
      '• Tutti i versamenti\n' +
      '• Tutti i fornitori\n' +

    save('cm_entrate',    []);

    save('cm_condomini',  CONDOMINI_DEFAULT);

// ===========================
// PIANO RATE AUTOMATICO
// ===========================
function calcolaPianoRate(anno, nRate=3) {
  const myEdId = getUserEdificio(state.user);
  const speseAnno = (isSuperAdmin(state.user) ? state.spese : state.spese.filter(s=>s.edificioId===state.edificioAttivo))
    .filter(s=>new Date(s.data).getFullYear()===anno);
  const entrateAnno = (isSuperAdmin(state.user) ? state.entrate : state.entrate.filter(e=>!e.edificioId||e.edificioId===myEdId))
    .filter(e=>new Date(e.data).getFullYear()===anno && !e.previsionale);
  const nAttivi = state.condomini.filter(c=>c.edificioId===state.edificioAttivo&&!c.disabled&&!c.superAdmin).length || 1;

  // Totale spese: consuntivo se chiuse, preventivo se aperte
  const totSpeseFull   = speseAnno.reduce((a,s)=>a+parseFloat(s.consuntivo||s.preventivo||0),0);
  const totGiaVersato  = entrateAnno.reduce((a,e)=>a+parseFloat(e.importo||0),0);
  const daRaccogliere  = Math.max(0, totSpeseFull - totGiaVersato);

  // Mesi rate: Marzo(3), Luglio(7), Novembre(11)
  const MESI_RATE = [3, 7, 11];
  const oggi = new Date();
  // Usa solo mesi futuri dell'anno selezionato
  const mesiFuturi = anno > oggi.getFullYear()
    ? MESI_RATE  // anno futuro: tutte le rate
    : anno < oggi.getFullYear()
    ? []  // anno passato: nessuna rata
    : MESI_RATE.filter(m => new Date(anno, m-1, 1) > oggi);

  const nRateEff = Math.min(nRate, mesiFuturi.length);
  if (daRaccogliere === 0 || nRateEff === 0) {
    return { totSpeseFull, totGiaVersato, daRaccogliere, rate:[], coperto: daRaccogliere===0, nAttivi };
  }

  const rataTot   = Math.round(daRaccogliere / nRateEff * 100) / 100;
  const rataCondo = Math.round(rataTot / nAttivi * 100) / 100;
  const rate = mesiFuturi.slice(0, nRateEff).map((m, i) => ({
    n: i+1,
    data: `${anno}-${String(m).padStart(2,'0')}-01`,
    mese: ['','Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'][m],
    importoTotale: rataTot,
    importoPerCondo: rataCondo,
  }));

  return { totSpeseFull, totGiaVersato, daRaccogliere, rate, coperto:false, nAttivi };
}


// ===========================
// PIANO RATE BOX
// ===========================
function renderPianoRateBox(annoSel, canEdit) {
  if (!canEdit || !annoSel || annoSel === 0) return '';
  const piano = calcolaPianoRate(annoSel);

  if (piano.coperto) {
    return '<div class="alert alert-success" style="margin-bottom:1rem;font-size:13px">' +
      '✅ <strong>Anno ' + annoSel + ' coperto</strong> — Versato ' + fmt(piano.totGiaVersato) +
      ' su ' + fmt(piano.totSpeseFull) + ' previsti. Nessuna rata necessaria.</div>';
  }
  if (piano.rate.length === 0) return '';

  const rateHtml = piano.rate.map(function(r) {
    return '<div style="flex:1;min-width:150px;background:#f5f3ff;border-radius:var(--radius-sm);padding:.875rem;border-left:3px solid #7c3aed;text-align:center">' +
      '<div style="font-weight:700;color:#7c3aed;margin-bottom:2px">Rata ' + r.n + ' — ' + r.mese + '</div>' +
      '<div style="font-size:11px;color:var(--text2);margin-bottom:.5rem">' + r.data + '</div>' +
      '<div style="font-size:1.4rem;font-weight:800;color:#5b21b6">' + fmt(r.importoPerCondo) + '</div>' +
      '<div style="font-size:11px;color:var(--text2)">per condomino</div>' +
      '<div style="font-size:11px;color:var(--text2);margin-top:4px">Tot: ' + fmt(r.importoTotale) + '</div>' +
    '</div>';
  }).join('');

  return '<div class="card" style="margin-bottom:1rem;border-top:3px solid #7c3aed">' +
    '<div class="card-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem">' +
    '<h3>📅 Piano rate suggerito ' + annoSel + '</h3>' +
    '<button class="btn btn-secondary btn-sm" id="btn-crea-rate-piano">➕ Crea rate previsionali</button>' +
    '</div>' +
    '<div style="padding:.75rem 1.25rem">' +
    '<div style="display:flex;gap:1.25rem;flex-wrap:wrap;margin-bottom:1rem;font-size:13px;background:var(--surface2);padding:.625rem .875rem;border-radius:var(--radius-sm)">' +
    '<div>Spese previste: <strong>' + fmt(piano.totSpeseFull) + '</strong></div>' +
    '<div>Già versato: <strong style="color:var(--green)">' + fmt(piano.totGiaVersato) + '</strong></div>' +
    '<div>Da raccogliere: <strong style="color:#7c3aed">' + fmt(piano.daRaccogliere) + '</strong></div>' +
    '<div>Condomini: <strong>' + piano.nAttivi + '</strong></div>' +
    '</div>' +
    '<div style="display:flex;gap:.75rem;flex-wrap:wrap">' + rateHtml + '</div>' +
    '<div style="font-size:11px;color:var(--text2);margin-top:.75rem">' +
    '<div style="font-size:11px;color:var(--text2);margin-top:.75rem">' +
    '💡 Rate su Marzo, Luglio e Novembre in base alle spese restanti. Clicca per creare versamenti previsionali.' +
    '</div>' +
    (function(){
      // Analisi rotture di cassa tra oggi e la prima rata
      if (!piano.rate.length) return '';
      const oggi = new Date();
      const firstRata = new Date(piano.rate[0].data);
      const myEdId2 = state.edificioAttivo;
      const allSpese = isSuperAdmin(state.user)?state.spese:state.spese.filter(s=>s.edificioId===myEdId2);
      const speseAntecedenti = allSpese
        .filter(s=>parseFloat(s.consuntivo||0)===0&&parseFloat(s.preventivo||0)>0)
        .filter(s=>{ const d=new Date(s.data); return d>oggi&&d<firstRata; });
      if (!speseAntecedenti.length) return '<div style="font-size:11px;color:var(--green);margin-top:5px">✅ Nessuna spesa forecast prima della prima rata — cassa al sicuro.</div>';
      const totPrima = speseAntecedenti.reduce((a,s)=>a+parseFloat(s.preventivo||0),0);
      const totCons  = allSpese.filter(s=>parseFloat(s.consuntivo||0)>0).reduce((a,s)=>a+parseFloat(s.consuntivo||0),0);
      const saldo    = piano.totGiaVersato - totCons;
      const ok       = saldo >= totPrima;
      return '<div style="background:'+(ok?'#f0fdf4':'#fef2f2')+';border:1px solid '+(ok?'#bbf7d0':'#fecaca')+';border-radius:6px;padding:.4rem .75rem;margin-top:5px;font-size:11px">' +
        (ok?'✅':'⚠️') + ' Prima della prima rata (' + piano.rate[0].mese + ') ci sono <strong>' + speseAntecedenti.length + ' spese forecast</strong> per <strong>' + fmt(totPrima) + '</strong>' +
        (ok?' — cassa sufficiente (saldo ' + fmt(saldo) + ')' : ' — <strong style="color:var(--red)">RISCHIO ROTTURA DI CASSA</strong> (saldo ' + fmt(saldo) + ')') +
        '</div>';
    })() +
    '</div></div>';
}

function aggiornaAnteprimaRicorrenza() {
  const preview    = document.getElementById('ricorrenza-preview-list');
  const mData      = document.getElementById('m-data');
  const mFreqFine  = document.getElementById('m-freq-fine');
  const mFreq      = document.getElementById('m-freq');
  if (!preview) return;

  const dataInizio = mData?.value;
  const dataFine   = mFreqFine?.value;
  const freq       = mFreq?.value || 'mensile';

  if (!dataInizio || !dataFine) {
    preview.innerHTML = '<span style="color:var(--text2)">Seleziona frequenza e data fine per vedere l\'anteprima</span>';
    return;
  }
  if (new Date(dataFine) <= new Date(dataInizio)) {
    preview.innerHTML = '<span style="color:var(--red)">⚠️ La data fine deve essere successiva alla data della prima spesa</span>';
    return;
  }
  const baseItem = { data: dataInizio, ricorrente:true, frequenza:freq };
  const occ = generaOccorrenze(baseItem, dataFine);
  if (occ.length === 0) {
    preview.innerHTML = '<span style="color:var(--text2)">Nessuna occorrenza nel periodo selezionato</span>';
    return;
  }
  const max   = 6;
  const shown = occ.slice(0, max);
  const rest  = occ.length - max;
  const freqLabel = {
    settimanale:'settimana', mensile:'mese', bimestrale:'2 mesi',
    trimestrale:'3 mesi', semestrale:'6 mesi', annuale:'anno'
  }[freq] || freq;
  preview.innerHTML = `
    <div style="margin-bottom:5px">
      <span style="color:var(--accent);font-weight:600">${occ.length} occorrenze</span>
      <span style="color:var(--text2)"> · ogni ${freqLabel} · fino al ${dataFine}</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:4px">
      ${shown.map(o=>`<span style="background:var(--accent-light);color:var(--accent);border-radius:4px;padding:2px 7px;font-size:11px;font-weight:500">${o.data}</span>`).join('')}
      ${rest>0?`<span style="color:var(--text2);font-size:11px;align-self:center">+${rest} altre…</span>`:''}
    </div>`;
}

function bindModal() {
  const close = () => setState({modal:null});
  const ov = document.getElementById('modal-overlay');
  if (ov) ov.onclick = e => { if(e.target===ov) close(); };
  const mc = document.getElementById('modal-close');
  if (mc) mc.onclick = close;
  const mca = document.getElementById('modal-cancel');
  if (mca) mca.onclick = close;
  const ms = document.getElementById('modal-save');
  if (ms) ms.onclick = () => saveModal();

  // Dropzone
  bindDropzone();

  // Reset password admin
  const bResetAdmin = document.getElementById('btn-save-reset-admin');
  if (bResetAdmin) bResetAdmin.onclick = () => {
    const id  = parseInt(bResetAdmin.dataset.id);
    const pw  = document.getElementById('admin-new-pw')?.value?.trim();
    const okEl= document.getElementById('reset-admin-ok');
    if (!pw || pw.length < 4) { alert('Inserisci una password di almeno 4 caratteri'); return; }
    setUserPassword(String(id), pw);
    okEl.textContent = '✅ Password offline aggiornata. Comunicala al condomino.';

    const setPrev = (val) => {
      document.getElementById('m-previsionale').value = val ? '1' : '0';

      document.getElementById('rate-section').style.display   = val ? 'block' : 'none';
      document.getElementById('singolo-section').style.display= val ? 'none'  : 'block';
      tabEff.className  = `btn ${!val?'btn-primary':'btn-secondary'} btn-sm`;
      tabPrev.className = `btn ${val?'btn-primary':'btn-secondary'} btn-sm`;
      tabEff.style.flex = tabPrev.style.flex = '1';

      if (saveBtn) saveBtn.textContent = val ? '💾 Pianifica rate' : '💾 Registra';
    };
    tabEff.onclick  = () => setPrev(false);

  // Toggle rate aggiuntive (R3, R4)
  [2,3,4].forEach(i => {

      btn.textContent = visible ? '➕' : '➖';
      if (visible) {
        const di = document.getElementById(`rata-importo-${i}`);
        if (di) di.value = '';
      }
      aggiornaRateTotale();
    };
  });

  // Calcola totale rate in tempo reale
  function aggiornaRateTotale() {
    let tot = 0;
    [1,2,3,4].forEach(i => {
      const row = document.getElementById(`rata-row-${i}`);
      if (row && row.style.display !== 'none') {
        tot += parseFloat(document.getElementById(`rata-importo-${i}`)?.value||0);
      }
    });
    const el = document.getElementById('rate-totale-val');
    if (el) el.textContent = fmt(tot);
  }
  [1,2,3,4].forEach(i => {
    const inp = document.getElementById(`rata-importo-${i}`);
    if (inp) inp.addEventListener('input', aggiornaRateTotale);
  });

  // ── Migrazione edificioId (pagina Impostazioni) ──────────────────────────
  const bMigra = document.getElementById('btn-migra-edificio-id');
  if (bMigra) bMigra.onclick = async () => {
    const stats = getMigrationStats();
    const firstEd = state.edifici.find(e=>e.id===stats.firstEdId) || state.edifici[0];
    if (!firstEd) { alert('Nessun edificio trovato.'); return; }
    if (stats.totale === 0) { alert('Nessun record da migrare — tutto e gia associato a un condominio.'); return; }
    const msg1 = 'Stai per associare ' + stats.totale + ' record a "' + firstEd.nome + '".' +
      (stats.condSenza  > 0 ? '\n- ' + stats.condSenza  + ' condomini'  : '') +
      (stats.speseSenza > 0 ? '\n- ' + stats.speseSenza + ' spese'      : '') +
      (stats.entSenza   > 0 ? '\n- ' + stats.entSenza   + ' versamenti' : '') +
      (stats.fornSenza  > 0 ? '\n- ' + stats.fornSenza  + ' fornitori'  : '') +

    try {

    // Password gestita da Firebase Auth — usa il pulsante "Invia email reset"

function bindSplit() {
  const tbody = document.getElementById('split-tbody');
  if (!tbody) return;

  const n = state.condomini.length;

  // ── helpers ──────────────────────────────────────────────────────────
  function getRef() {
    const cons = parseFloat(document.getElementById('m-cons')?.value||0);
    const prev = parseFloat(document.getElementById('m-prev')?.value||0);
    return cons > 0 ? cons : prev > 0 ? prev : 0;
  }

  function getLocked() {
    const locked = {};
    document.querySelectorAll('.split-lock-btn').forEach(b => {
      if (b.dataset.locked === '1') locked[b.dataset.lockCid] = true;
    });
    return locked;
  }

  function getPercInputs() {
    const res = {};
    document.querySelectorAll('.split-perc-inp').forEach(inp => { res[inp.dataset.cid] = parseFloat(inp.value)||0; });
    return res;
  }

  function getEuroInputs() {
    const res = {};
    document.querySelectorAll('.split-euro-inp').forEach(inp => { res[inp.dataset.cid] = parseFloat(inp.value)||0; });
    return res;
  }

  function setPercInputs(map) {
    document.querySelectorAll('.split-perc-inp').forEach(inp => {
      if (map[inp.dataset.cid] !== undefined) inp.value = map[inp.dataset.cid].toFixed(2);
    });
  }

  function setEuroInputs(map) {
    document.querySelectorAll('.split-euro-inp').forEach(inp => {
      if (map[inp.dataset.cid] !== undefined) inp.value = map[inp.dataset.cid].toFixed(2);
    });
  }

  function updateTotals() {
    const percs = getPercInputs();
    const ref   = getRef();
    const total = Object.values(percs).reduce((a,v)=>a+(v||0), 0);
    const diff  = Math.abs(total - 100);

    const ptEl = document.getElementById('split-total-perc');
    if (ptEl) {
      ptEl.textContent = total.toFixed(2) + ' %';
      ptEl.style.color = diff > 0.05 ? 'var(--red)' : 'var(--green)';
    }
    const warn = document.getElementById('split-warn');
    if (warn) {
      if (diff > 0.05) {
        warn.style.display='block';
        warn.textContent = `⚠️ Le percentuali sommano ${total.toFixed(2)}% invece di 100%. Differenza: ${(total-100).toFixed(2)}%`;
      } else {
        warn.style.display='none';
      }
    }

    // Euro totale
    const euroRow = document.getElementById('split-total-euro-row');
    const euroEl  = document.getElementById('split-total-euro');
    if (ref > 0) {
      if (euroRow) euroRow.style.display='flex';
      if (euroEl)  euroEl.textContent = fmt(ref);
    } else {
      if (euroRow) euroRow.style.display='none';
    }

    // Barra colorata — solo condomini dell'edificio attivo (strict)
    const barEl = document.getElementById('split-bar');
    if (barEl) {
      const condBar = state.condomini.filter(c=>c.edificioId===state.edificioAttivo&&!c.disabled&&!c.superAdmin);
      barEl.innerHTML = condBar.map(c=>{
        const w = Math.max(0, Math.min(100, percs[String(c.id)]||0));
        return `<div class="split-bar-seg" style="width:${w}%;background:${c.color};opacity:.8"></div>`;
      }).join('');
    }
  }

  // ── ricalcolo quando cambia una % ─────────────────────────────────────
  function onPercChange(changedCid) {
    const locked   = getLocked();
    const percs    = getPercInputs();
    const ref      = getRef();
    const allCids  = state.condomini.filter(c=>c.edificioId===state.edificioAttivo&&!c.disabled&&!c.superAdmin).map(c=>String(c.id));
    const freeCids = allCids.filter(cid => cid !== changedCid && !locked[cid]);
    const lockedSum = allCids.filter(cid => cid !== changedCid && locked[cid])
                             .reduce((a,cid)=>a+(percs[cid]||0), 0);
    const newVal   = percs[changedCid] || 0;
    const remaining = 100 - newVal - lockedSum;

    if (freeCids.length > 0) {
      const each = remaining / freeCids.length;
      const newPercs = {};
      freeCids.forEach(cid => newPercs[cid] = Math.max(0, each));
      setPercInputs(newPercs);
    }

    // Aggiorna euro
    if (ref > 0) {
      const allP = getPercInputs();
      const euroMap = {};
      allCids.forEach(cid => euroMap[cid] = (allP[cid]||0) / 100 * ref);
      setEuroInputs(euroMap);
    }
    updateTotals();
  }

  // ── ricalcolo quando cambia un € ─────────────────────────────────────
  function onEuroChange(changedCid) {
    const ref = getRef();
    if (ref <= 0) return; // senza importo non possiamo calcolare %
    const locked  = getLocked();
    const euros   = getEuroInputs();
    const allCids = state.condomini.filter(c=>c.edificioId===state.edificioAttivo&&!c.disabled&&!c.superAdmin).map(c=>String(c.id));
    const changedEuro = euros[changedCid] || 0;
    const changedPerc = (changedEuro / ref) * 100;

    // Aggiorna la % del campo cambiato
    const percMap = {};
    percMap[changedCid] = changedPerc;
    setPercInputs(percMap);

    // Ricalcola gli altri come se avessimo cambiato la %
    const lockedEuroSum = allCids.filter(c => c !== changedCid && locked[c])
                                 .reduce((a,cid)=>a+(euros[cid]||0), 0);
    const freeCids = allCids.filter(c => c !== changedCid && !locked[c]);
    const remaining = ref - changedEuro - lockedEuroSum;

    if (freeCids.length > 0) {
      const each = Math.max(0, remaining / freeCids.length);
      const eMap = {}, pMap = {};
      freeCids.forEach(cid => {
        eMap[cid] = each;
        pMap[cid] = (each / ref) * 100;
      });
      setEuroInputs(eMap);
      setPercInputs(pMap);
    }
    updateTotals();
  }

  // ── parti uguali ──────────────────────────────────────────────────────
  function equalSplit() {
    const ref  = getRef();
    // USA SOLO i condomini dell'edificio attivo (strict, no superAdmin)
    const condAttivi = state.condomini.filter(c =>
      c.edificioId === state.edificioAttivo && !c.disabled && !c.superAdmin
    );
    const n    = condAttivi.length || 1;
    const each = parseFloat((100 / n).toFixed(4));
    const pMap = {}, eMap = {};
    condAttivi.forEach(c => {
      pMap[String(c.id)] = each;
      eMap[String(c.id)] = ref > 0 ? parseFloat((each/100*ref).toFixed(2)) : 0;
    });
    // sblocca tutti e aggiorna
    document.querySelectorAll('.split-lock-btn').forEach(b => {
      b.dataset.locked = '0'; b.textContent = '🔓'; b.classList.remove('locked');
    });
    setPercInputs(pMap);
    setEuroInputs(eMap);
    updateTotals();
  }

  // ── event listeners ───────────────────────────────────────────────────
  document.querySelectorAll('.split-perc-inp').forEach(inp => {
    inp.addEventListener('focus', () => {
      // Al focus: blocca automaticamente questo campo così non viene sovrascritto dal ricalcolo
      const btn = document.querySelector(`.split-lock-btn[data-lock-cid="${inp.dataset.cid}"]`);
      if (btn && btn.dataset.locked !== '1') {
        btn.dataset.locked = '1';
        btn.textContent = '🔒';
        btn.classList.add('locked');
      }
    });
    inp.addEventListener('input', () => onPercChange(inp.dataset.cid));
  });
  document.querySelectorAll('.split-euro-inp').forEach(inp => {
    inp.addEventListener('focus', () => {
      // Al focus: blocca automaticamente questo campo
      const btn = document.querySelector(`.split-lock-btn[data-lock-cid="${inp.dataset.cid}"]`);
      if (btn && btn.dataset.locked !== '1') {
        btn.dataset.locked = '1';
        btn.textContent = '🔒';
        btn.classList.add('locked');
      }
    });
    inp.addEventListener('input', () => onEuroChange(inp.dataset.cid));
  });
  document.querySelectorAll('.split-lock-btn').forEach(btn => {
    btn.onclick = () => {
      const locked = btn.dataset.locked === '1';
      btn.dataset.locked = locked ? '0' : '1';
      btn.textContent = locked ? '🔓' : '🔒';
      btn.classList.toggle('locked', !locked);
    };
  });

  const btnEqual = document.getElementById('split-equal');
  if (btnEqual) btnEqual.onclick = equalSplit;

  const btnResetLock = document.getElementById('split-reset-lock');
  if (btnResetLock) btnResetLock.onclick = () => {
    document.querySelectorAll('.split-lock-btn').forEach(b => {
      b.dataset.locked = '0'; b.textContent = '🔓'; b.classList.remove('locked');
    });
  };

  // ── ricalcola euro quando cambiano gli importi ────────────────────────
  ['m-cons','m-prev'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', () => {
      const ref = getRef();
      const percs = getPercInputs();
    const allCids = state.condomini.filter(c=>c.edificioId===state.edificioAttivo&&!c.disabled&&!c.superAdmin).map(c=>String(c.id));
      if (ref > 0) {
        const eMap = {};
        allCids.forEach(cid => eMap[cid] = (percs[cid]||0)/100*ref);
        setEuroInputs(eMap);
      }
      updateTotals();
    });
  });

  // inizializza
  updateTotals();
}

// helper per leggere lo split dal DOM al salvataggio
function readSplitFromDOM() {
  const split = [];
  document.querySelectorAll('.split-perc-inp').forEach(inp => {
    const lockBtn = document.querySelector(`.split-lock-btn[data-lock-cid="${inp.dataset.cid}"]`);
    split.push({
      id: parseInt(inp.dataset.cid),
      perc: parseFloat(inp.value)||0,
      locked: lockBtn?.dataset?.locked === '1',
    });
  });
  return split;
}

function bindWizard() {
  const wNext = document.getElementById('wiz-next');
  const wBack = document.getElementById('wiz-back');
  if (!wNext) return; // non siamo nel wizard

  // Ruolo card click
  document.querySelectorAll('[data-pick-ruolo]').forEach(card => {
    card.onclick = () => {
      const r = card.dataset.pickRuolo;
      state.wizardData = {...(state.wizardData||{}), ruolo: r};
      document.querySelectorAll('[data-pick-ruolo]').forEach(c => {
        c.className = 'ruolo-card';
        if (c.dataset.pickRuolo === r) c.classList.add('selected-' + r);
      });
    };
  });

  // Password live validation
  const pw1 = document.getElementById('wiz-pw1');
  if (pw1) pw1.oninput = () => {
    const errs = validatePassword(pw1.value);
    const el = document.getElementById('wiz-pw-rules');
    if (!pw1.value) { el.innerHTML=''; return; }
    el.innerHTML = errs.length===0
      ? '<span style="color:var(--green)">✅ Password valida</span>'
      : errs.map(e=>`<span style="color:var(--red)">✗ ${e}</span>`).join(' &nbsp;');
  };

  wBack.onclick = () => {
    const step = state.wizardStep || 1;
    if (step > 1) setState({wizardStep: step - 1});
  };

  wNext.onclick = () => {
    const step = state.wizardStep || 1;
    const wd   = state.wizardData || {};
    const showErr = (id, msg) => {
      const el = document.getElementById(id);
      if (el) { el.textContent = msg; el.style.display = 'block'; }
    };
    const hideErr = (id) => {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    };

    if (step === 1) {
      const nome = document.getElementById('wiz-nome')?.value?.trim();
      const apt  = document.getElementById('wiz-apt')?.value?.trim();
      const email= document.getElementById('wiz-email')?.value?.trim();
      hideErr('wiz-err1');
      if (!nome || !apt) { showErr('wiz-err1','Nome e appartamento sono obbligatori'); return; }
      const edificioSel = parseInt(document.getElementById('wiz-edificio')?.value)||state.edificioAttivo;
      const usernameSel = (document.getElementById('wiz-username')?.value||'').trim().toLowerCase().replace(/[^a-z0-9._-]/g,'');
      state.wizardData = {...wd, nome, appartamento:apt, email, edificioId:edificioSel, username:usernameSel};
      setState({wizardStep: 2});

    } else if (step === 2) {
      hideErr('wiz-err2');
      const ruolo = state.wizardData?.ruolo || null;
      if (!ruolo) { showErr('wiz-err2','Seleziona un ruolo'); return; }
      setState({wizardStep: 3});

    } else if (step === 3) {
      const v1 = document.getElementById('wiz-pw1')?.value;
      const v2 = document.getElementById('wiz-pw2')?.value;
      hideErr('wiz-err3');
      const errs = validatePassword(v1);
      if (errs.length > 0) { showErr('wiz-err3','Password non valida: '+errs.join(', ')); return; }
      if (v1 !== v2) { showErr('wiz-err3','Le password non coincidono'); return; }
      // Crea l'utente
      const d = state.wizardData;
      const ruolo = d.ruolo;
      const isAdminNew = ruolo === 'adminedificio';
      const canEditNew = ruolo === 'modifica' || ruolo === 'adminedificio';
      const superAdminNew = false;
      const nextIdx = state.condomini.length % COLORS.length;
      const nuovoUtente = {
        id: newId(),
        nome: d.nome,
        appartamento: d.appartamento,
        email: d.email||'',
        canEdit: canEditNew,
        isAdmin: isAdminNew,
        color: COLORS[nextIdx],
        edificioId: d.edificioId || state.edificioAttivo,
        username: (d.username||'').trim().toLowerCase().replace(/[^a-z0-9._-]/g,''),
        superAdmin: superAdminNew || false,
      };
      const condomini = [...state.condomini, nuovoUtente];
      save('cm_condomini', condomini);
      setUserPassword(String(nuovoUtente.id), v1);
      // Su Firebase: mostra istruzioni per creare l'account Auth
      if (window._fb && nuovoUtente.email) {
        state._pendingFirebaseUser = {email: nuovoUtente.email, password: v1, nome: nuovoUtente.nome};
      }
      setState({condomini, modal: window._fb && nuovoUtente.email ? {type:'firebase-user-created', data: nuovoUtente} : null, wizardStep:1, wizardData:{}});
    }
  };
}

function saveModal() {
  const m = state.modal;
  if (m.type === 'spesa') {
    const titolo = document.getElementById('m-titolo')?.value?.trim();
    const desc = document.getElementById('m-desc')?.value?.trim();
    const cat = document.getElementById('m-cat')?.value;
    const tipo = document.getElementById('m-tipo')?.value;
    const prev = document.getElementById('m-prev')?.value;
    const cons = document.getElementById('m-cons')?.value;
    const data = document.getElementById('m-data')?.value;
    if (!titolo || !cat || !data) { alert('Compila i campi obbligatori (Titolo, Categoria, Data)'); return; }
    if (!prev && !cons) { alert('Inserisci almeno un importo (preventivo o consuntivo)'); return; }
    const existingAllegati = m.data?.allegati||[];
    const allegati = [...existingAllegati, ...state.pendingFiles];
    const split = readSplitFromDOM();
    const fornitoreId = parseInt(document.getElementById('m-fornitore')?.value)||null;
    const ricorrente = document.getElementById('m-ricorrente')?.checked || false;
    const frequenza  = document.getElementById('m-freq')?.value || 'mensile';
    const ricorrenzaFine = document.getElementById('m-freq-fine')?.value || '';
    // Validazione: data fine obbligatoria per spese ricorrenti
    if (ricorrente && !ricorrenzaFine) {
      const errEl = document.getElementById('m-err');
      if (errEl) { errEl.textContent = 'Inserisci la data di fine per la spesa ricorrente'; errEl.style.display='block'; }
      else alert('Inserisci la data di fine per la spesa ricorrente');
      return;
    }
    const ricGruppoId = m.data?.ricGruppoId || (ricorrente ? newId() : null);
    const item = { id: m.data?.id||newId(), titolo, descrizione:desc, categoria:cat, tipoSpesa:tipo, preventivo:prev||'', consuntivo:cons||'', data, allegati, split, fornitoreId, edificioId: state.edificioAttivo, ricorrente, frequenza: ricorrente?frequenza:null, ricorrenzaFine: ricorrente?ricorrenzaFine:'', ricGruppoId };
    let spese;
    if (m.data?.id) {
      // Modifica spesa esistente
      spese = state.spese.map(s=>s.id===item.id ? item : s);
      // Se la ricorrenza è stata AGGIUNTA o MODIFICATA rispetto all'originale:
      // genera le nuove occorrenze future partendo dal giorno dopo la data della spesa
      const eraRicorrente = !!m.data?.ricorrente;
      const cambiataFreq  = m.data?.frequenza !== frequenza;
      const cambiatiFine  = m.data?.ricorrenzaFine !== ricorrenzaFine;
      if (ricorrente && (!eraRicorrente || cambiataFreq || cambiatiFine)) {
        // Rimuovi occorrenze precedenti dello stesso gruppo (se erano già state create)
        if (item.ricGruppoId) {
          spese = spese.filter(s => !(s.ricGruppoId === item.ricGruppoId && s.id !== item.id));
        }
        // Genera nuove occorrenze future (dalla data della spesa in poi)
        const occorrenze = generaOccorrenze(item, ricorrenzaFine);
        spese = [...spese, ...occorrenze];
        if (occorrenze.length > 0) {
          alert('✅ Ricorrenza aggiornata: create ' + occorrenze.length + ' occorrenze future.');
        }
      }
    } else {
      spese = [...state.spese, item];
      // Genera occorrenze future se ricorrente (nuova spesa)
      if (ricorrente) {
        const occorrenze = generaOccorrenze(item, ricorrenzaFine);
        spese = [...spese, ...occorrenze];
      }
    }
    save('cm_spese', spese);
    setState({spese, modal:null, pendingFiles:[]});
  } else if (m.type === 'entrata') {
    const previsionale = document.getElementById('m-previsionale')?.value === '1';
    const errEl = document.getElementById('entrata-err');
    const showErr = (msg) => { if(errEl){errEl.textContent=msg;errEl.style.display='block';} else alert(msg); };

    if (m.data?.id) {
      // ── MODIFICA / VALIDAZIONE singola ──────────────────────────────────
      const condoId  = parseInt(document.getElementById('m-condo-s')?.value);
      const importo  = document.getElementById('m-importo-s')?.value;
      const data     = document.getElementById('m-data-s')?.value;
      const desc     = document.getElementById('m-desc-s')?.value?.trim();
      const cat      = document.getElementById('m-cat-s')?.value||'quote';
      if (!condoId || !importo || !data) { showErr('Compila tutti i campi obbligatori'); return; }
      // Validazione: rimane previsionale SOLO se il toggle è ancora su prev
      const entrate = state.entrate.map(e => e.id===m.data.id
        ? {...e, condominoId:condoId, importo, data, descrizione:desc, categoria:cat, previsionale: m.data.previsionale ? previsionale : false}
        : e);
      save('cm_entrate', entrate);
      setState({entrate, modal:null});

    } else if (previsionale) {
      // ── INSERIMENTO RATE PREVISIONALI ────────────────────────────────────
      const condoId = parseInt(document.getElementById('m-condo')?.value);
      const desc    = document.getElementById('m-desc')?.value?.trim();
      const cat     = document.getElementById('m-cat')?.value||'quote';
      if (!condoId) { showErr('Seleziona il condomino'); return; }

      const rate = [];
      [1,2,3,4].forEach(i => {
        const row     = document.getElementById(`rata-row-${i}`);
        if (!row || row.style.display === 'none') return;
        const dataR   = document.getElementById(`rata-data-${i}`)?.value;
        const importoR= document.getElementById(`rata-importo-${i}`)?.value;
        if (dataR && importoR && parseFloat(importoR)>0) {
          rate.push({ id:newId(), condominoId:condoId, importo:importoR, data:dataR,
            descrizione: desc ? `${desc} — Rata ${i}` : `Rata ${i}`,
            categoria:cat, edificioId:state.edificioAttivo, previsionale:true });
        }
      });
      if (rate.length === 0) { showErr('Inserisci almeno una rata con data e importo'); return; }
      const entrate = [...state.entrate, ...rate];
      save('cm_entrate', entrate);
      setState({entrate, modal:null});

    } else {
      // ── INSERIMENTO EFFETTIVO SINGOLO ────────────────────────────────────
      const condoId = parseInt(document.getElementById('m-condo-s')?.value);
      const importo = document.getElementById('m-importo-s')?.value;
      const data    = document.getElementById('m-data-s')?.value;
      const desc    = document.getElementById('m-desc-s')?.value?.trim();
      const cat     = document.getElementById('m-cat-s')?.value||'quote';
      if (!condoId || !importo || !data) { showErr('Compila tutti i campi obbligatori'); return; }
      const item = { id:newId(), condominoId:condoId, importo, data, descrizione:desc, categoria:cat, edificioId:state.edificioAttivo, previsionale:false };
      const entrate = [...state.entrate, item];
      save('cm_entrate', entrate);
      setState({entrate, modal:null});
    }
  } else if (m.type === 'cond') {
    const nome = document.getElementById('m-nome')?.value?.trim();
    const apt = document.getElementById('m-apt')?.value?.trim();
    const email = document.getElementById('m-email')?.value?.trim();
    const ruolo = document.getElementById('m-ruolo')?.value || 'lettura';
    const edificioId = parseInt(document.getElementById('m-edificio')?.value) || getUserEdificio(state.user);
    const isAdminNew = ruolo === 'adminedificio';
    const canEditNew = ruolo === 'modifica' || isAdminNew;
    const superAdminNew = false; // promozione a superAdmin solo via select dedicata
    if (!nome || !apt) { alert('Nome e appartamento sono obbligatori'); return; }
    let condomini;
    if (m.data?.id) {
      const username = document.getElementById('m-username')?.value?.trim().toLowerCase().replace(/[^a-z0-9._-]/g,'') || '';
      // ── Blocco spostamento: RIGIDO se ha transazioni ─────────────────
      const condOld      = state.condomini.find(c=>c.id===m.data.id);
      const oldEdId      = condOld?.edificioId || state.edificioAttivo;
      const cambiaEd     = edificioId !== oldEdId;
      const hasEntrate   = state.entrate.some(e=>e.condominoId===m.data.id);
      const hasSpeseSplit= state.spese.some(s=>s.split?.some(x=>x.id===m.data.id));
      const hasDati      = hasEntrate || hasSpeseSplit;
      const edificioIdFinale = (() => {
        if (!cambiaEd) return edificioId;  // stesso edificio — sempre OK
        if (hasDati) {
          const nEnt = state.entrate.filter(e=>e.condominoId===m.data.id).length;
          const nSp  = state.spese.filter(s=>s.split?.some(x=>x.id===m.data.id)).length;
          alert(
            `⛔ Impossibile spostare "${condOld?.nome}" in un altro condominio.\n\n` +
            `Ha transazioni associate:\n• ${nEnt} versamenti\n• ${nSp} spese\n\n` +
            `Crea un profilo separato per questo utente nel nuovo condominio.`
          );
          return oldEdId;  // mantieni edificio originale — BLOCCO TOTALE
        }
        return edificioId;  // nessuna transazione → spostamento libero
      })();
      condomini = state.condomini.map(c=>c.id===m.data.id
        ? {...c, nome, appartamento:apt, email, username, canEdit:canEditNew, isAdmin:isAdminNew, superAdmin:c.superAdmin||false, edificioId:edificioIdFinale}
        : c);
      // Se il ruolo dell'utente loggato è cambiato, aggiornare anche state.user
      if (state.user && state.user.id === m.data.id) {
        setState({user:{...state.user, canEdit:canEditNew, isAdmin:isAdminNew, edificioId}});
      }
    } else {
      const nextIdx = state.condomini.length % COLORS.length;
      const usernameNew = document.getElementById('m-username')?.value?.trim().toLowerCase().replace(/[^a-z0-9._-]/g,'') || '';
      // Verifica unicità username
      if (usernameNew && state.condomini.some(c=>c.username===usernameNew)) {
        alert('Username già in uso. Scegli un nome diverso.'); return;
      }
      condomini = [...state.condomini, {id:newId(),nome,appartamento:apt,email,username:usernameNew,canEdit:canEditNew,isAdmin:isAdminNew,superAdmin:false,edificioId,color:COLORS[nextIdx]}];
    }
    save('cm_condomini', condomini);
    setState({condomini, modal:null});
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getAnni() {
  const anni = new Set();
  const myEdId = getUserEdificio(state.user);
  const filtSpese   = isSuperAdmin(state.user) ? state.spese   : state.spese.filter(s=>s.edificioId===state.edificioAttivo);
  const filtEntrate = isSuperAdmin(state.user) ? state.entrate : state.entrate.filter(e=>!e.edificioId||e.edificioId===myEdId);
  filtSpese.forEach(s => anni.add(new Date(s.data).getFullYear()));
  filtEntrate.forEach(e => anni.add(new Date(e.data).getFullYear()));
  const currYear = new Date().getFullYear();
  anni.add(currYear);
  // Riempi gli anni mancanti tra il primo dato e oggi
  if (anni.size > 0) {
    const min = Math.min(...anni);
    for (let y = min; y <= currYear; y++) anni.add(y);
  }
  return [...anni].sort((a,b)=>b-a);
}

// getAnni per spese/entrate: include opzione "Tutti"
function getAnniConTutti() {
  return getAnni(); // usato nelle pagine spese/entrate dove c'è già l'opzione "Tutti gli anni"
}

// Calcola il saldo cumulativo fino alla fine dell'anno precedente (riporto)
function getSaldoRiporto(annoTarget) {
  const all = [ADMIN, ...state.condomini];
  const spesePrec  = isSuperAdmin(state.user)
    ? state.spese.filter(s=>new Date(s.data).getFullYear() < annoTarget)
    : state.spese.filter(s=>(!s.edificioId||s.edificioId===getUserEdificio(state.user)) && new Date(s.data).getFullYear() < annoTarget);
  const entratePrec = isSuperAdmin(state.user)
    ? state.entrate.filter(e=>!e.previsionale && new Date(e.data).getFullYear() < annoTarget)
    : state.entrate.filter(e=>(!e.edificioId||e.edificioId===getUserEdificio(state.user)) && !e.previsionale && new Date(e.data).getFullYear() < annoTarget);
  const totSpesePrec   = spesePrec.reduce((a,s)=>a+parseFloat(s.consuntivo||0),0);
  const totEntratePrec = entratePrec.reduce((a,e)=>a+parseFloat(e.importo||0),0);
  return totEntratePrec - totSpesePrec; // saldo riportato dagli anni precedenti
}

// --- MOBILE TOUCH SWIPE ---
(function() {
  let touchStartX = 0;
  let touchStartY = 0;
  document.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, {passive: true});
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
    if (dy > 60) return;
    if (dx > 60 && touchStartX < 30 && !state.sidebarOpen) {
      setState({sidebarOpen: true});
    } else if (dx < -60 && state.sidebarOpen) {
      setState({sidebarOpen: false});
    }
  }, {passive: true});
})();

// ═══════════════════════════════════════════════════════
//  INIT — Avvio app con Firebase
// ═══════════════════════════════════════════════════════
async function initApp() {
  document.getElementById('app').innerHTML = renderLoading();

  // 1. Aspetta Firebase SDK (max 5s)
  if (!window._fbReady) {
    await new Promise(resolve => {
      document.addEventListener('fb-ready', resolve, {once: true});
      setTimeout(resolve, 5000);
    });
  }

  if (!window._fb) {
    console.warn('Firebase non disponibile');
    render();
    return;
  }

  const { auth, db, doc, getDoc, onAuthStateChanged } = window._fb;

  // 2. Carica SUPER_ADMIN_UID da Firestore con timeout 5s
  // cm_config ha il campo superAdminUid direttamente (non come JSON)
  try {
    const cfgPromise = getDoc(doc(db, 'appdata', 'cm_config'));
    const cfgTimeout = new Promise(r => setTimeout(() => r(null), 5000));
    const cfgSnap = await Promise.race([cfgPromise, cfgTimeout]);
    if (cfgSnap && cfgSnap.exists()) {
      const data = cfgSnap.data();
      // Supporta sia campo diretto che campo value JSON
      if (data.superAdminUid) {
        SUPER_ADMIN_UID = data.superAdminUid;
      } else if (data.value) {
        try { SUPER_ADMIN_UID = JSON.parse(data.value).superAdminUid || null; } catch {}
      }
      console.log('SuperAdmin UID:', SUPER_ADMIN_UID ? '✅' : '❌ non trovato');
    } else {
      console.warn('cm_config timeout o non trovato');
    }
  } catch(e) { console.warn('cm_config error:', e.message); }

  // 3. Carica dati Firestore con timeout 8s
  try {
    const loadPromise = fbLoadAll();
    const loadTimeout = new Promise(r => setTimeout(r, 8000));
    await Promise.race([loadPromise, loadTimeout]);
  } catch(e) { console.warn('fbLoadAll error:', e.message); }
  const savedCondomini  = load('cm_condomini',  null);
  const savedSpese      = load('cm_spese',      null);
  const savedEntrate    = load('cm_entrate',    null);
  const savedFornitori  = load('cm_fornitori',  null);
  const savedEdifici    = load('cm_edifici',    null);
  const savedEdAttivo   = load('cm_edificio_attivo', null);
  const savedCategorie  = load('cm_categorie',  null);
  if (savedCondomini)  state.condomini      = savedCondomini;
  if (savedSpese)      state.spese          = savedSpese;
  if (savedEntrate)    state.entrate        = savedEntrate;
  if (savedFornitori)  state.fornitori      = savedFornitori;
  if (savedEdifici && savedEdifici.length > 0) state.edifici = savedEdifici;
  if (savedEdAttivo)   state.edificioAttivo = savedEdAttivo;
  if (savedCategorie)  state.categorie      = savedCategorie;

  // 4. ORA registra onAuthStateChanged — i dati sono già pronti
  onAuthStateChanged(auth, async (firebaseUser) => {
    if (firebaseUser) {
      const isSuperAdminUser = SUPER_ADMIN_UID && firebaseUser.uid === SUPER_ADMIN_UID;

      // Cerca profilo per UID (sicuro) poi per email (fallback)
      let profile = state.condomini.find(c => c.uid === firebaseUser.uid)
                 || state.condomini.find(c => c.email && c.email.toLowerCase() === firebaseUser.email.toLowerCase());

      // SuperAdmin: crea profilo dinamico se non in state.condomini
      if (!profile && isSuperAdminUser) {
        profile = {
          id: 0,
          nome: firebaseUser.displayName || 'Super Admin',
          email: firebaseUser.email,
          uid: firebaseUser.uid,
          appartamento: 'Admin',
          superAdmin: true,
          isAdmin: true,
          canEdit: true,
          color: '#1B2A4A',
        };
      }

      if (!profile) {
        // Utente Firebase valido ma nessun profilo trovato
        // Fai logout per evitare stati inconsistenti
        console.warn('Utente Firebase senza profilo app:', firebaseUser.email);
        await window._fb.signOut(auth);
        state.user = null;
        render();
        return;
      }

      if (profile.disabled) {
        await window._fb.signOut(auth);
        state.user = null;
        render();
        return;
      }

      const wasLoggedOut = !state.user;
      state.user = profile;
      // Aggiorna UID nel profilo se trovato per email (prima sincronizzazione)
      if (!profile.uid && profile.id !== 0) {
        const condomini = state.condomini.map(c =>
          c.id === profile.id ? {...c, uid: firebaseUser.uid} : c
        );
        state.condomini = condomini;
        save('cm_condomini', condomini);
      }
      if (!isSuperAdmin(profile) && profile.edificioId) {
        state.edificioAttivo = profile.edificioId;
        save('cm_edificio_attivo', profile.edificioId);
      }
      if (wasLoggedOut) state.page = 'dashboard';
    } else {
      state.user = null;
    }
    render();
  });
}


function renderLoading() {
  return `<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;color:#5A6E8A">
    <div style="width:48px;height:48px;background:#2563EB;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px">🏠</div>
    <div style="font-weight:700;font-size:1.1rem;color:#1B2A4A">Cond. Neri da Rimini 20</div>
    <div style="font-size:14px">Connessione a Firebase…</div>
    <div style="width:200px;height:3px;background:#EEF2F7;border-radius:10px;overflow:hidden">
      <div style="height:100%;background:#2563EB;border-radius:10px;animation:loading-bar 1.5s ease-in-out infinite"></div>
    </div>
    <style>@keyframes loading-bar{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}</style>
  </div>`;
}
